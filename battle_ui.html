<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>WORLDHATCH — Battle</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

:root {
  --bg:        #0a0a18;
  --panel:     #10102a;
  --gold:      #f7c948;
  --green:     #5dfc8a;
  --red:       #ff5555;
  --blue:      #5aafff;
  --purple:    #cc44ff;
  --orange:    #ff9944;
  --dim:       #333355;
  --border:    #222244;
  --text:      #e8e8f0;
  --fire:      #ff6b35;
  --nature:    #5dfc8a;
  --ice:       #88ddff;
  --storm:     #cc44ff;
  --spirit:    #ffdd88;
  --dark:      #aa88ff;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'VT323', monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(247,201,72,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(247,201,72,0.02) 1px, transparent 1px);
  background-size: 24px 24px;
  pointer-events: none;
}

/* ══ HEADER ══ */
#header {
  width: 100%;
  max-width: 600px;
  padding: 12px 16px 0;
  text-align: center;
}

h1 {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(8px, 3vw, 13px);
  color: var(--gold);
  text-shadow: 0 0 12px rgba(247,201,72,0.5), 2px 2px 0 #7a5a00;
  letter-spacing: 2px;
}

#turn-label {
  font-size: 18px;
  color: var(--dim);
  margin-top: 4px;
}

/* ══ BATTLE FIELD ══ */
#battle-field {
  width: 100%;
  max-width: 600px;
  padding: 12px 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* ── Creature Card ── */
.creature-card {
  background: var(--panel);
  border: 2px solid var(--border);
  border-radius: 4px;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  position: relative;
}

.creature-card.player  { border-color: var(--blue); }
.creature-card.opponent{ border-color: var(--red);  }

.creature-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.creature-name {
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  letter-spacing: 1px;
}

.creature-element {
  font-size: 15px;
  padding: 2px 8px;
  border-radius: 2px;
  background: rgba(0,0,0,0.4);
}

.element-fire   { color: var(--fire);   border: 1px solid var(--fire);   }
.element-nature { color: var(--nature); border: 1px solid var(--nature); }
.element-ice    { color: var(--ice);    border: 1px solid var(--ice);    }
.element-storm  { color: var(--storm);  border: 1px solid var(--storm);  }
.element-spirit { color: var(--spirit); border: 1px solid var(--spirit); }
.element-dark   { color: var(--dark);   border: 1px solid var(--dark);   }

/* HP Bar */
.bar-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 15px;
}

.bar-label { color: var(--dim); width: 30px; flex-shrink: 0; }

.bar-track {
  flex: 1;
  height: 10px;
  background: rgba(0,0,0,0.5);
  border: 1px solid var(--border);
  border-radius: 1px;
  overflow: hidden;
}

.bar-fill {
  height: 100%;
  border-radius: 1px;
  transition: width 0.4s ease;
}

.hp-fill    { background: var(--green); }
.energy-fill{ background: var(--gold);  }

.hp-fill.medium { background: var(--orange); }
.hp-fill.low    { background: var(--red);    }

.bar-value { color: var(--text); font-size: 14px; width: 60px; text-align: right; }

.special-ready {
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  color: var(--gold);
  text-align: center;
  animation: pulse 0.8s ease-in-out infinite;
  padding: 2px;
  border: 1px solid var(--gold);
  border-radius: 2px;
}

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

.status-badge {
  font-size: 14px;
  padding: 1px 6px;
  border-radius: 2px;
  display: inline-block;
}
.status-burned  { background: rgba(255,100,50,0.3);  color: var(--fire);   border: 1px solid var(--fire);   }
.status-frozen  { background: rgba(136,221,255,0.2); color: var(--ice);    border: 1px solid var(--ice);    }
.status-rooted  { background: rgba(93,252,138,0.2);  color: var(--nature); border: 1px solid var(--nature); }

/* ══ DICE ROLL DISPLAY ══ */
#dice-area {
  width: 100%;
  max-width: 600px;
  padding: 0 16px;
  min-height: 100px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

#dice-container {
  display: flex;
  gap: 20px;
  align-items: center;
  justify-content: center;
}

.die {
  width: 72px;
  height: 72px;
  background: var(--panel);
  border: 3px solid var(--gold);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Press Start 2P', monospace;
  font-size: 22px;
  color: var(--gold);
  position: relative;
  transition: transform 0.1s;
  box-shadow: 0 0 20px rgba(247,201,72,0.2);
}

.die.rolling {
  animation: diceRoll 0.08s linear infinite;
}

.die.landed-crit-fail   { border-color: var(--red);    color: var(--red);    box-shadow: 0 0 20px rgba(255,85,85,0.5);    }
.die.landed-weak        { border-color: var(--orange);  color: var(--orange); box-shadow: 0 0 20px rgba(255,153,68,0.4);  }
.die.landed-normal      { border-color: var(--text);    color: var(--text);   }
.die.landed-strong      { border-color: var(--blue);    color: var(--blue);   box-shadow: 0 0 20px rgba(90,175,255,0.4);  }
.die.landed-heavy       { border-color: var(--gold);    color: var(--gold);   box-shadow: 0 0 30px rgba(247,201,72,0.6);  }
.die.landed-crit        { border-color: var(--green);   color: var(--green);  box-shadow: 0 0 40px rgba(93,252,138,0.8);  animation: critGlow 0.5s ease-in-out infinite; }

@keyframes diceRoll {
  0%   { transform: rotate(0deg)   scale(1.0); }
  25%  { transform: rotate(15deg)  scale(1.05); }
  50%  { transform: rotate(-10deg) scale(0.95); }
  75%  { transform: rotate(8deg)   scale(1.02); }
  100% { transform: rotate(0deg)   scale(1.0); }
}

@keyframes critGlow {
  0%,100% { box-shadow: 0 0 40px rgba(93,252,138,0.8); }
  50%     { box-shadow: 0 0 80px rgba(93,252,138,1.0); }
}

.die-label {
  font-size: 13px;
  color: var(--dim);
  text-align: center;
}

#roll-result-label {
  font-family: 'Press Start 2P', monospace;
  font-size: 11px;
  text-align: center;
  min-height: 20px;
  letter-spacing: 1px;
  transition: color 0.2s;
}

#type-bonus-label {
  font-size: 18px;
  text-align: center;
  min-height: 20px;
}

/* ══ BATTLE LOG ══ */
#battle-log {
  width: 100%;
  max-width: 600px;
  padding: 0 16px;
}

#log-box {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 10px;
  font-size: 16px;
  line-height: 1.8;
  color: #aaaacc;
  height: 100px;
  overflow-y: auto;
  font-family: 'VT323', monospace;
}

#log-box .log-crit   { color: var(--green); }
#log-box .log-damage { color: var(--red);   }
#log-box .log-energy { color: var(--gold);  }
#log-box .log-status { color: var(--orange);}

/* ══ MOVE SELECTION ══ */
#move-selection {
  width: 100%;
  max-width: 600px;
  padding: 10px 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.move-section-label {
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  color: var(--dim);
  letter-spacing: 1px;
}

#moves-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.move-btn {
  background: var(--panel);
  border: 2px solid var(--border);
  color: var(--text);
  font-family: 'VT323', monospace;
  font-size: 18px;
  padding: 10px 8px;
  cursor: pointer;
  border-radius: 2px;
  text-align: left;
  transition: border-color 0.15s, background 0.15s;
  line-height: 1.3;
}

.move-btn:hover:not(:disabled) {
  border-color: var(--blue);
  background: rgba(90,175,255,0.1);
}

.move-btn:disabled {
  opacity: 0.35;
  cursor: not-allowed;
}

.move-btn .move-name  { display: block; font-size: 18px; }
.move-btn .move-power { display: block; font-size: 14px; color: var(--dim); }
.move-btn .move-elem  { font-size: 13px; }

.move-btn.base-attack {
  border-color: var(--dim);
}

.special-btn {
  grid-column: 1 / -1;
  background: rgba(247,201,72,0.1);
  border: 2px solid var(--gold);
  color: var(--gold);
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  padding: 12px;
  cursor: pointer;
  border-radius: 2px;
  letter-spacing: 1px;
  transition: background 0.15s;
  animation: pulse 1s ease-in-out infinite;
}

.special-btn:hover { background: rgba(247,201,72,0.25); }
.special-btn:disabled { opacity: 0.3; cursor: not-allowed; animation: none; }

/* ══ BATTLE OVER ══ */
#battle-over {
  display: none;
  width: 100%;
  max-width: 600px;
  padding: 20px 16px;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}

#battle-over.show { display: flex; }

#winner-banner {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(10px, 4vw, 16px);
  text-align: center;
  color: var(--gold);
  text-shadow: 0 0 20px rgba(247,201,72,0.8), 2px 2px 0 #7a5a00;
  letter-spacing: 2px;
  animation: pulse 1s ease-in-out infinite;
}

#rematch-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  background: transparent;
  color: var(--gold);
  border: 2px solid var(--gold);
  padding: 12px 20px;
  cursor: pointer;
  border-radius: 2px;
  letter-spacing: 1px;
  transition: background 0.15s, color 0.15s;
}

#rematch-btn:hover { background: var(--gold); color: var(--bg); }
</style>
</head>
<body>

<div id="header">
  <h1>⚔ WORLDHATCH BATTLE ⚔</h1>
  <div id="turn-label">Turn 1</div>
</div>

<!-- Battle Field -->
<div id="battle-field">

  <!-- Opponent -->
  <div class="creature-card opponent" id="opponent-card">
    <div class="creature-header">
      <div class="creature-name" id="opp-name">Glacierfang</div>
      <div class="creature-element element-ice" id="opp-element">❄ ICE</div>
    </div>
    <div class="bar-row">
      <div class="bar-label">HP</div>
      <div class="bar-track"><div class="bar-fill hp-fill" id="opp-hp-bar" style="width:100%"></div></div>
      <div class="bar-value" id="opp-hp-val">102/102</div>
    </div>
    <div id="opp-status"></div>
  </div>

  <!-- Dice Area -->
  <div id="dice-area">
    <div id="dice-container">
      <div style="text-align:center">
        <div class="die-label" id="atk-die-label">ATTACK</div>
        <div class="die" id="atk-die">?</div>
      </div>
      <div style="text-align:center">
        <div class="die-label" id="counter-die-label" style="display:none">COUNTER</div>
        <div class="die" id="counter-die" style="display:none">?</div>
      </div>
    </div>
    <div id="roll-result-label"></div>
    <div id="type-bonus-label"></div>
  </div>

  <!-- Player -->
  <div class="creature-card player" id="player-card">
    <div class="creature-header">
      <div class="creature-name" id="player-name">Emberback Rumbler</div>
      <div class="creature-element element-fire" id="player-element">🔥 FIRE</div>
    </div>
    <div class="bar-row">
      <div class="bar-label">HP</div>
      <div class="bar-track"><div class="bar-fill hp-fill" id="player-hp-bar" style="width:100%"></div></div>
      <div class="bar-value" id="player-hp-val">90/90</div>
    </div>
    <div class="bar-row">
      <div class="bar-label">⚡</div>
      <div class="bar-track"><div class="bar-fill energy-fill" id="player-energy-bar" style="width:0%"></div></div>
      <div class="bar-value" id="player-energy-val">0/100</div>
    </div>
    <div id="player-special-ready" style="display:none" class="special-ready">★ SPECIAL READY ★</div>
    <div id="player-status"></div>
  </div>

</div>

<!-- Battle Log -->
<div id="battle-log">
  <div id="log-box">⚔ Battle begins! Choose your move...</div>
</div>

<!-- Move Selection -->
<div id="move-selection">
  <div class="move-section-label">SELECT MOVE</div>
  <div id="moves-grid">
    <!-- populated by JS -->
  </div>
</div>

<!-- Battle Over -->
<div id="battle-over">
  <div id="winner-banner"></div>
  <button id="rematch-btn" onclick="initBattle()">↺ REMATCH</button>
</div>

<script>
// ═══════════════════════════════════════════════
//  WORLDHATCH Battle UI
//  Handles dice animation, battle state display,
//  and move selection.
//
//  In production: connects to battle.py via API.
//  Currently: full self-contained demo with mock data.
// ═══════════════════════════════════════════════

// ── Element display config ────────────────────
const ELEMENT_CONFIG = {
  fire:   { icon: "🔥", color: "var(--fire)",   cls: "element-fire"   },
  nature: { icon: "🌿", color: "var(--nature)", cls: "element-nature" },
  ice:    { icon: "❄",  color: "var(--ice)",    cls: "element-ice"    },
  storm:  { icon: "⚡",  color: "var(--storm)",  cls: "element-storm"  },
  spirit: { icon: "✨",  color: "var(--spirit)", cls: "element-spirit" },
  dark:   { icon: "🌑", color: "var(--dark)",   cls: "element-dark"   },
};

// Circle of life
const ELEMENT_CIRCLE = ["fire","nature","ice","storm","spirit","dark"];

function getTypeMult(atkElem, defElem) {
  const ai = ELEMENT_CIRCLE.indexOf(atkElem);
  const di = ELEMENT_CIRCLE.indexOf(defElem);
  if (ai < 0 || di < 0) return 1.0;
  const len = ELEMENT_CIRCLE.length;
  if ((ai + 1) % len === di) return 1.5;
  if ((ai - 1 + len) % len === di) return 0.5;
  return 1.0;
}

// Roll outcome thresholds
function getRollOutcome(roll) {
  if (roll === 1)            return { id:"critical_fail", label:"CRITICAL FAIL!",  mult:0.0,  energy:-15, dieClass:"landed-crit-fail" };
  if (roll <= 5)             return { id:"weak_hit",      label:"Weak Hit",        mult:0.25, energy:5,   dieClass:"landed-weak"      };
  if (roll <= 10)            return { id:"normal_hit",    label:"Hit",             mult:0.75, energy:10,  dieClass:"landed-normal"    };
  if (roll <= 15)            return { id:"strong_hit",    label:"Strong Hit!",     mult:1.0,  energy:15,  dieClass:"landed-strong"    };
  if (roll <= 19)            return { id:"heavy_hit",     label:"Heavy Hit!!",     mult:1.25, energy:20,  dieClass:"landed-heavy"     };
  return                            { id:"critical_hit",  label:"CRITICAL HIT!!!",  mult:2.0,  energy:35,  dieClass:"landed-crit"     };
}

// ── Battle State ──────────────────────────────
let state = {
  turn: 1,
  isOver: false,
  busy: false,        // true while dice are rolling
  player: {
    name: "Emberback Rumbler", element: "fire",
    hp: 90, maxHp: 90, energy: 0, maxEnergy: 100,
    status: null, level: 6,
    moves: [
      { id:"ember_bite",  name:"Ember Bite",  element:"fire",   power:40, accuracy:0.95 },
      { id:"scorchwave",  name:"Scorchwave",  element:"fire",   power:55, accuracy:0.90 },
    ],
  },
  opponent: {
    name: "Glacierfang", element: "ice",
    hp: 102, maxHp: 102, energy: 0, maxEnergy: 100,
    status: null, level: 1,
    moves: [
      { id:"glacial_slam", name:"Glacial Slam", element:"ice", power:60, accuracy:0.85 },
      { id:"root_bind",    name:"Root Bind",    element:"nature", power:30, accuracy:0.95 },
    ],
  },
};

// ── Dice Roll Animation ───────────────────────
function animateDie(dieEl, finalValue, duration, callback) {
  dieEl.className = "die rolling";
  const start = Date.now();
  const interval = setInterval(() => {
    dieEl.textContent = Math.floor(Math.random() * 20) + 1;
    if (Date.now() - start >= duration) {
      clearInterval(interval);
      dieEl.textContent = finalValue;
      if (callback) callback();
    }
  }, 80);
}

function rollD20() {
  return Math.floor(Math.random() * 20) + 1;
}

// ── Execute Player Turn ───────────────────────
async function executeMove(moveId, isSpecial = false) {
  if (state.busy || state.isOver) return;
  state.busy = true;
  disableMoves(true);

  const move = isSpecial
    ? { id:"special", name:"⚡ SPECIAL!", element: state.player.element, power: 120, accuracy: 1.0 }
    : (moveId === "base_attack"
        ? { id:"base_attack", name:`${state.player.element.toUpperCase()} STRIKE`, element: state.player.element, power: state.player.hp > 0 ? 30 : 20, accuracy: 0.95 }
        : state.player.moves.find(m => m.id === moveId));

  if (!move) { state.busy = false; disableMoves(false); return; }

  // ── Show attack die ───────────────────────
  const atkDie = document.getElementById("atk-die");
  document.getElementById("atk-die-label").textContent = "ATTACK";
  atkDie.style.display = "flex";
  document.getElementById("roll-result-label").textContent = "";
  document.getElementById("type-bonus-label").textContent  = "";

  const atkRoll = rollD20();
  await new Promise(resolve => animateDie(atkDie, atkRoll, 900, resolve));

  const outcome = getRollOutcome(atkRoll);
  atkDie.className = `die ${outcome.dieClass}`;

  // Show outcome label
  const rollLabel = document.getElementById("roll-result-label");
  rollLabel.textContent = outcome.label;
  rollLabel.style.color = outcome.dieClass.includes("crit-fail") ? "var(--red)"
                        : outcome.dieClass.includes("crit)")     ? "var(--green)"
                        : outcome.dieClass.includes("heavy")     ? "var(--gold)"
                        : outcome.dieClass.includes("strong")    ? "var(--blue)"
                        : "var(--text)";

  await sleep(400);

  // ── Counter roll (opponent) ───────────────
  // Opponent can counter if roll ≥ 15 (has lone_wanderer equivalent)
  let counterSuccess = false;
  const canCounter = state.opponent.element === "dark" || state.opponent.moves.some(m => m.id === "shadow_dash");

  if (canCounter && atkRoll > 1) {
    const counterDie = document.getElementById("counter-die");
    document.getElementById("counter-die-label").style.display = "block";
    counterDie.style.display = "flex";

    const counterRoll = rollD20();
    await new Promise(resolve => animateDie(counterDie, counterRoll, 700, resolve));
    const cOutcome = getRollOutcome(counterRoll);
    counterDie.className = `die ${cOutcome.dieClass}`;

    counterSuccess = counterRoll >= atkRoll;
    addLog(counterSuccess
      ? `🛡 Counter SUCCESS! (rolled ${counterRoll})`
      : `❌ Counter failed! (rolled ${counterRoll})`, "log-status");

    await sleep(500);
    counterDie.style.display = "none";
    document.getElementById("counter-die-label").style.display = "none";
  }

  // ── Type bonus ────────────────────────────
  const typeMult  = getTypeMult(move.element, state.opponent.element);
  const typeBonusEl = document.getElementById("type-bonus-label");
  if (typeMult > 1.0) {
    typeBonusEl.textContent = "🔥 Super Effective!";
    typeBonusEl.style.color = "var(--orange)";
  } else if (typeMult < 1.0) {
    typeBonusEl.textContent = "💧 Not Very Effective...";
    typeBonusEl.style.color = "var(--blue)";
  } else {
    typeBonusEl.textContent = "";
  }

  // ── Calculate damage ──────────────────────
  if (outcome.id !== "critical_fail") {
    let dmg = Math.max(1, Math.round(
      (state.player.hp * move.power) / (state.opponent.maxHp * 2)
      * typeMult * outcome.mult * (counterSuccess ? 0.5 : 1.0) * 5
    ));

    state.opponent.hp = Math.max(0, state.opponent.hp - dmg);
    addLog(`💥 ${move.name} deals ${dmg} damage to ${state.opponent.name}!`, "log-damage");
  } else {
    addLog(`💨 ${state.player.name} missed!`);
  }

  // ── Energy update ─────────────────────────
  const energyGain = outcome.energy;
  if (isSpecial) {
    state.player.energy = 0;
  } else {
    state.player.energy = Math.min(100, Math.max(0, state.player.energy + energyGain));
  }

  addLog(`⚡ Energy: ${state.player.energy}/100`, "log-energy");
  if (outcome.id === "critical_hit") {
    addLog(`★ CRITICAL HIT! Double damage!`, "log-crit");
  }

  updateUI();
  await sleep(600);

  // ── Check win ─────────────────────────────
  if (state.opponent.hp <= 0) {
    endBattle(state.player.name);
    return;
  }

  // ── Opponent turn ─────────────────────────
  await sleep(500);
  await opponentTurn();
}

async function opponentTurn() {
  addLog(`\n— ${state.opponent.name}'s turn —`);

  const atkDie = document.getElementById("atk-die");
  document.getElementById("atk-die-label").textContent = `${state.opponent.name}`;
  document.getElementById("roll-result-label").textContent = "";
  document.getElementById("type-bonus-label").textContent  = "";

  const oppRoll = rollD20();
  await new Promise(resolve => animateDie(atkDie, oppRoll, 800, resolve));
  const outcome = getRollOutcome(oppRoll);
  atkDie.className = `die ${outcome.dieClass}`;
  document.getElementById("roll-result-label").textContent = outcome.label;

  await sleep(400);

  // Pick a random move
  const oppMove = state.opponent.moves[Math.floor(Math.random() * state.opponent.moves.length)];
  const typeMult = getTypeMult(oppMove.element, state.player.element);

  if (outcome.id !== "critical_fail") {
    let dmg = Math.max(1, Math.round(
      (state.opponent.maxHp * oppMove.power) / (state.player.maxHp * 3)
      * typeMult * outcome.mult * 4
    ));
    state.player.hp = Math.max(0, state.player.hp - dmg);
    addLog(`💥 ${oppMove.name} deals ${dmg} damage to ${state.player.name}!`, "log-damage");
  } else {
    addLog(`💨 ${state.opponent.name} missed!`);
  }

  state.turn++;
  updateUI();

  if (state.player.hp <= 0) {
    endBattle(state.opponent.name);
    return;
  }

  state.busy = false;
  disableMoves(false);
  document.getElementById("turn-label").textContent = `Turn ${state.turn}`;
}

// ── UI Updates ────────────────────────────────
function updateUI() {
  // Player HP
  const pHpPct = Math.max(0, (state.player.hp / state.player.maxHp) * 100);
  const pBar   = document.getElementById("player-hp-bar");
  pBar.style.width = pHpPct + "%";
  pBar.className = "bar-fill hp-fill" + (pHpPct < 25 ? " low" : pHpPct < 50 ? " medium" : "");
  document.getElementById("player-hp-val").textContent = `${state.player.hp}/${state.player.maxHp}`;

  // Player Energy
  document.getElementById("player-energy-bar").style.width = state.player.energy + "%";
  document.getElementById("player-energy-val").textContent = `${state.player.energy}/100`;
  document.getElementById("player-special-ready").style.display =
    state.player.energy >= 100 ? "block" : "none";

  // Opponent HP
  const oHpPct = Math.max(0, (state.opponent.hp / state.opponent.maxHp) * 100);
  const oBar   = document.getElementById("opp-hp-bar");
  oBar.style.width = oHpPct + "%";
  oBar.className = "bar-fill hp-fill" + (oHpPct < 25 ? " low" : oHpPct < 50 ? " medium" : "");
  document.getElementById("opp-hp-val").textContent = `${state.opponent.hp}/${state.opponent.maxHp}`;

  // Rebuild move buttons
  buildMoveButtons();
}

function buildMoveButtons() {
  const grid = document.getElementById("moves-grid");
  grid.innerHTML = "";

  // Base attack (always available)
  const baseBtn = document.createElement("button");
  baseBtn.className = "move-btn base-attack";
  baseBtn.innerHTML = `
    <span class="move-name">${state.player.element.toUpperCase()} STRIKE</span>
    <span class="move-power">Base Attack</span>`;
  baseBtn.onclick = () => executeMove("base_attack");
  grid.appendChild(baseBtn);

  // Learned moves
  state.player.moves.forEach(move => {
    const btn = document.createElement("button");
    btn.className = "move-btn";
    const elem = ELEMENT_CONFIG[move.element] || { icon: "◆", color: "var(--text)" };
    btn.innerHTML = `
      <span class="move-name">${elem.icon} ${move.name}</span>
      <span class="move-power">PWR ${move.power} | ${move.element.toUpperCase()}</span>`;
    btn.onclick = () => executeMove(move.id);
    grid.appendChild(btn);
  });

  // Special move (full row, only if energy full)
  const specialBtn = document.createElement("button");
  specialBtn.className = "special-btn";
  specialBtn.textContent = "★ SPECIAL MOVE ★";
  specialBtn.disabled = state.player.energy < 100;
  specialBtn.onclick = () => executeMove(null, true);
  grid.appendChild(specialBtn);
}

function disableMoves(disabled) {
  document.querySelectorAll(".move-btn, .special-btn").forEach(btn => {
    btn.disabled = disabled;
  });
}

function addLog(msg, cls = "") {
  const log = document.getElementById("log-box");
  const line = document.createElement("div");
  if (cls) line.className = cls;
  line.textContent = msg;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
}

function endBattle(winnerName) {
  state.isOver = true;
  document.getElementById("move-selection").style.display = "none";
  const over = document.getElementById("battle-over");
  over.className = "show";
  document.getElementById("winner-banner").textContent =
    `🏆 ${winnerName} WINS! 🏆`;
  addLog(`\n🏆 ${winnerName} wins the battle!`, "log-crit");
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── Init ──────────────────────────────────────
function initBattle() {
  state.player.hp     = state.player.maxHp;
  state.player.energy = 0;
  state.opponent.hp   = state.opponent.maxHp;
  state.turn          = 1;
  state.isOver        = false;
  state.busy          = false;

  document.getElementById("log-box").innerHTML = "⚔ Battle begins! Choose your move...";
  document.getElementById("move-selection").style.display = "flex";
  document.getElementById("battle-over").className        = "";
  document.getElementById("turn-label").textContent       = "Turn 1";
  document.getElementById("roll-result-label").textContent = "";
  document.getElementById("type-bonus-label").textContent  = "";
  document.getElementById("atk-die").textContent           = "?";
  document.getElementById("atk-die").className             = "die";

  // Element display
  const pElem = ELEMENT_CONFIG[state.player.element]   || { icon:"◆", cls:"" };
  const oElem = ELEMENT_CONFIG[state.opponent.element] || { icon:"◆", cls:"" };
  document.getElementById("player-element").textContent  = `${pElem.icon} ${state.player.element.toUpperCase()}`;
  document.getElementById("player-element").className    = `creature-element ${pElem.cls}`;
  document.getElementById("opp-element").textContent     = `${oElem.icon} ${state.opponent.element.toUpperCase()}`;
  document.getElementById("opp-element").className       = `creature-element ${oElem.cls}`;
  document.getElementById("player-name").textContent     = state.player.name;
  document.getElementById("opp-name").textContent        = state.opponent.name;

  updateUI();
}

initBattle();
</script>
</body>
</html>
