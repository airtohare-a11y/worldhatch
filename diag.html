<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>WORLDHATCH — Diagnostics</title>
<style>
body{background:#080010;color:#e0d0ff;font-family:monospace;font-size:13px;padding:20px;line-height:1.8;}
h1{color:#ffcc44;font-size:16px;margin-bottom:20px;}
h2{color:#cc88ff;font-size:13px;margin:20px 0 8px;border-bottom:1px solid #330055;padding-bottom:4px;}
.ok{color:#44ff88;}
.fail{color:#ff4444;}
.warn{color:#ffaa00;}
.info{color:#8888cc;}
pre{background:#0a0018;padding:12px;border:1px solid #330055;border-radius:4px;overflow-x:auto;font-size:11px;white-space:pre-wrap;word-break:break-all;}
button{font-family:monospace;font-size:12px;background:#1a0030;color:#cc88ff;border:1px solid #440088;padding:6px 14px;cursor:pointer;border-radius:3px;margin:4px 2px;}
button:hover{background:#2a0050;}
#output{margin-top:10px;}
.section{margin-bottom:16px;}
</style>
</head>
<body>
<h1>🔧 WORLDHATCH DIAGNOSTICS</h1>
<button onclick="runAll()">▶ RUN ALL CHECKS</button>
<button onclick="clearOutput()">✕ CLEAR</button>
<div id="output"></div>

<script>
const out = document.getElementById('output');
function log(msg, cls='') {
  const d = document.createElement('div');
  d.className = cls;
  d.innerHTML = msg;
  out.appendChild(d);
}
function section(title) {
  const h = document.createElement('h2');
  h.textContent = title;
  out.appendChild(h);
}
function clearOutput() { out.innerHTML = ''; }

async function runAll() {
  clearOutput();
  log('Running diagnostics at ' + new Date().toLocaleTimeString(), 'info');

  // ── 1. FILE CHECKS ───────────────────────────────────────
  section('1. FILE AVAILABILITY');
  const files = [
    { path: 'world.html',     required: true,  desc: 'Main game file' },
    { path: 'server.py',      required: true,  desc: 'Python web server' },
    { path: 'art_inkfox.png', required: false, desc: 'Inkfox creature art' },
  ];

  for (const f of files) {
    try {
      const r = await fetch(f.path, { method: 'HEAD' });
      if (r.ok) {
        log(`<span class="ok">✓ FOUND</span>    ${f.path} — ${f.desc}`);
      } else {
        log(`<span class="${f.required?'fail':'warn'}">${f.required?'✗ MISSING':'⚠ MISSING'}</span>  ${f.path} — ${f.desc} (HTTP ${r.status})`);
      }
    } catch(e) {
      log(`<span class="${f.required?'fail':'warn'}">${f.required?'✗ ERROR':'⚠ ERROR'}</span>    ${f.path} — ${e.message}`);
    }
  }

  // ── 2. WORLD.HTML CONTENT CHECKS ────────────────────────
  section('2. WORLD.HTML CONTENT');
  let worldSrc = '';
  try {
    const r = await fetch('world.html');
    worldSrc = await r.text();
    log(`<span class="ok">✓ LOADED</span>   world.html (${(worldSrc.length/1024).toFixed(1)} KB)`);
  } catch(e) {
    log(`<span class="fail">✗ FAILED</span>   Cannot load world.html: ${e.message}`);
    return;
  }

  const contentChecks = [
    // Core systems
    { token: 'function init()',           label: 'init() function' },
    { token: 'function gameLoop(',        label: 'gameLoop()' },
    { token: 'function generateMap(',     label: 'generateMap()' },
    { token: 'function render()',         label: 'render()' },
    { token: 'function handleMovement(',  label: 'handleMovement()' },
    { token: 'function startBattle(',     label: 'startBattle()' },
    { token: 'function triggerEncounter(',label: 'triggerEncounter()' },
    { token: 'function triggerMiniBoss(', label: 'triggerMiniBoss()' },
    { token: 'function triggerFinalBoss(',label: 'triggerFinalBoss()' },
    { token: 'function grantXP(',         label: 'grantXP() — skill system' },
    { token: 'function drawPlayer(',      label: 'drawPlayer() — sprite' },
    { token: 'function drawTileDetail(',  label: 'drawTileDetail() — tiles' },
    { token: 'function drawMinimap()',    label: 'drawMinimap()' },
    { token: 'function updateHUD()',      label: 'updateHUD()' },
    { token: 'function showDialog(',      label: 'showDialog()' },
    { token: 'function menuInit()',       label: 'menuInit() — opening menu' },
    { token: 'function menuRollDice()',   label: 'menuRollDice() — dice reveal' },
    { token: 'function menuBeginGame()',  label: 'menuBeginGame()' },
    // Data
    { token: 'const REGIONS = {',        label: 'REGIONS data' },
    { token: 'const TILE_PAL_BASE',       label: 'Tile palette' },
    { token: 'const CREATURE_ART',        label: 'Art registry' },
    { token: 'const EGG_COLORS',          label: 'Egg rarity colors' },
    { token: 'const MENU_REGIONS',        label: 'Menu region data' },
    { token: 'const SKILL_TREES',         label: 'Skill trees' },
    { token: 'id="menu-overlay"',         label: 'Menu overlay HTML' },
    { token: 'id="battle-overlay"',       label: 'Battle overlay HTML' },
    { token: 'id="world"',                label: 'Game canvas HTML' },
    // Fixes
    { token: 'menuOpen = document.getElementById', label: 'keydown menu guard' },
    { token: 'pointer-events:all',         label: 'Menu pointer-events fix' },
    { token: 'touch-action:manipulation',  label: 'Touch fix on button' },
    { token: 'menuInit();',                label: 'menuInit called in init()' },
  ];

  let passCount = 0;
  for (const c of contentChecks) {
    const found = worldSrc.includes(c.token);
    if (found) passCount++;
    log(`<span class="${found?'ok':'fail'}">${found?'✓':'✗'}</span> ${c.label}`, found?'':'fail');
  }
  log(`<br><span class="${passCount===contentChecks.length?'ok':'warn'}">${passCount}/${contentChecks.length} checks passed</span>`);

  // ── 3. KNOWN BAD PATTERNS ───────────────────────────────
  section('3. KNOWN BROKEN PATTERNS');
  const badChecks = [
    { token: 'onclick="obNext()"',        label: 'Old inline obNext onclick' },
    { token: 'onclick="obRollDice()"',    label: 'Old inline obRollDice onclick' },
    { token: 'onclick="obStartGame()"',   label: 'Old inline obStartGame onclick' },
    { token: 'function obShowPanel(',     label: 'Old obShowPanel (replaced)' },
    { token: 'function obWireButtons()',  label: 'Old obWireButtons (removed)' },
    { token: 'playAttackCutscene',        label: 'Attack cutscene (removed)' },
    { token: 'function enterCave(',       label: 'Cave interior (removed)' },
    { token: 'function obGo(',            label: 'obGo() broken attempt' },
    { token: "style=\"display:none\">\n<div id=\"game-wrap\"", label: 'game-wrap hidden at start' },
    { token: 'WELCOME TO WORLDHATCH',     label: 'Old welcome dialog blocking' },
  ];

  let badCount = 0;
  for (const c of badChecks) {
    const found = worldSrc.includes(c.token);
    if (found) badCount++;
    log(`<span class="${found?'fail':'ok'}">${found?'✗ FOUND (BAD)':'✓ ABSENT (good)'}</span> ${c.label}`);
  }
  log(`<br><span class="${badCount===0?'ok':'fail'}">${badCount} bad patterns found</span>`);

  // ── 4. JS PARSE TEST ────────────────────────────────────
  section('4. JAVASCRIPT SYNTAX (iframe test)');
  try {
    const iframe = document.createElement('iframe');
    iframe.style.cssText = 'width:1px;height:1px;position:absolute;top:-9999px;';
    document.body.appendChild(iframe);

    let jsErrors = [];
    iframe.contentWindow.addEventListener('error', e => {
      jsErrors.push(`${e.message} (line ${e.lineno})`);
    });

    iframe.srcdoc = worldSrc;

    await new Promise(r => setTimeout(r, 2000));

    if (jsErrors.length === 0) {
      log('<span class="ok">✓ No JS errors detected in iframe</span>');
    } else {
      jsErrors.forEach(e => log(`<span class="fail">✗ JS ERROR: ${e}</span>`));
    }

    // Check if key functions exist in iframe
    const iw = iframe.contentWindow;
    const fnChecks = ['init','gameLoop','generateMap','menuInit','menuRollDice','menuBeginGame','grantXP'];
    for (const fn of fnChecks) {
      const exists = typeof iw[fn] === 'function';
      log(`<span class="${exists?'ok':'fail'}">${exists?'✓':'✗'}</span> window.${fn} — ${exists?'defined':'UNDEFINED'}`);
    }

    // Check key objects
    const objChecks = ['REGIONS','CREATURE_ART','EGG_COLORS','MENU_REGIONS','SKILL_TREES'];
    for (const obj of objChecks) {
      const exists = iw[obj] !== undefined;
      log(`<span class="${exists?'ok':'fail'}">${exists?'✓':'✗'}</span> ${obj} — ${exists?'defined':'UNDEFINED'}`);
    }

    // Check state
    if (iw.state) {
      log(`<span class="ok">✓</span> state object — inDialog:${iw.state.inDialog} inBattle:${iw.state.inBattle}`);
    } else {
      log('<span class="fail">✗ state object not found</span>');
    }

    document.body.removeChild(iframe);
  } catch(e) {
    log(`<span class="fail">✗ iframe test failed: ${e.message}</span>`);
  }

  // ── 5. BUTTON CLICKABILITY CHECK ────────────────────────
  section('5. MENU BUTTON CHECKS');
  const btnPatterns = [
    { id: 'menu-start-btn',  label: 'Start button in HTML' },
    { id: 'menu-choose-btn', label: 'Choose region button' },
    { id: 'dice-begin-btn',  label: 'Begin game button' },
    { id: 'dice-reroll-btn', label: 'Reroll button' },
  ];
  for (const b of btnPatterns) {
    const found = worldSrc.includes(`id="${b.id}"`);
    log(`<span class="${found?'ok':'fail'}">${found?'✓':'✗'}</span> ${b.label} (id="${b.id}")`);
  }

  // Check onclick vs wired in JS
  const inlineOnclicks = (worldSrc.match(/id="menu-[^"]*"[^>]*onclick/g)||[]).length;
  log(`<span class="${inlineOnclicks===0?'ok':'fail'}">${inlineOnclicks===0?'✓ No inline onclicks on menu buttons':'✗ '+inlineOnclicks+' inline onclicks found (bad!)'}</span>`);

  // ── 6. SUMMARY ──────────────────────────────────────────
  section('6. SUMMARY');
  const totalIssues = (contentChecks.length - passCount) + badCount;
  if (totalIssues === 0) {
    log('<span class="ok">✅ ALL CHECKS PASSED — game should work correctly</span>');
  } else {
    log(`<span class="fail">❌ ${totalIssues} issue(s) found — see above for details</span>`);
  }
  log('<span class="info">— Diagnostics complete —</span>');
}

// Auto-run on load
window.onload = runAll;
</script>
</body>
</html>
