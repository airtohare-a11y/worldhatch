<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WORLDHATCH — World Explorer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#080010;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;min-height:100vh;font-family:'Press Start 2P',monospace;overflow:hidden;}

/* ── LAYOUT ── */
#game-wrap{position:relative;width:100vw;max-width:800px;}
#top-bar{display:flex;justify-content:space-between;align-items:center;padding:6px 12px;background:#0d001a;border-bottom:2px solid #440088;}
#top-bar .player-info{font-size:7px;color:#cc88ff;}
#top-bar .region-name{font-size:8px;color:#ffcc44;text-shadow:0 0 8px #ffaa00;}
#top-bar .time-weather{font-size:7px;color:#8855aa;text-align:right;}
#game-canvas-wrap{position:relative;overflow:hidden;background:#000;}
canvas#world{display:block;image-rendering:pixelated;width:100%;cursor:none;}

/* ── HUD ── */
#hud{display:flex;gap:8px;padding:6px 10px;background:#0d001a;border-top:2px solid #440088;flex-wrap:wrap;}
.hud-box{background:#12002a;border:1px solid #330055;border-radius:3px;padding:5px 8px;font-size:6px;}
.hud-label{color:#664488;margin-bottom:3px;}
.hud-val{color:#cc88ff;}
.hp-bar-wrap,.en-bar-wrap{height:6px;background:#1a0030;border-radius:2px;width:80px;margin-top:3px;overflow:hidden;}
.hp-fill{height:100%;background:#44ff88;border-radius:2px;transition:width 0.2s;}
.en-fill{height:100%;background:#ffcc00;border-radius:2px;transition:width 0.2s;}

/* ── DIALOG ── */
#dialog{position:absolute;bottom:0;left:0;right:0;background:rgba(8,0,20,0.97);border-top:3px solid #cc44ff;padding:12px 16px;min-height:90px;display:none;z-index:50;}
#dialog-name{font-size:8px;color:#ff88ff;margin-bottom:8px;}
#dialog-text{font-size:7px;color:#e0d0ff;line-height:1.8;margin-bottom:10px;}
#dialog-options{display:flex;gap:8px;flex-wrap:wrap;}
.d-btn{font-family:'Press Start 2P',monospace;font-size:6px;background:#1a0030;color:#cc88ff;border:1px solid #660099;padding:5px 10px;cursor:pointer;border-radius:2px;}
.d-btn:hover{background:#330055;color:#ff88ff;}
.d-btn.primary{border-color:#cc44ff;color:#ff88ff;}

/* ── BATTLE OVERLAY — 16-BIT STYLE ── */
#battle-overlay{
  position:absolute;inset:0;z-index:100;display:none;
  flex-direction:column;align-items:center;justify-content:center;
  padding:12px;gap:10px;
  background:linear-gradient(160deg,#080018 0%,#0e0028 50%,#060010 100%);
}
#battle-overlay.show{display:flex;}
#battle-arena{
  width:100%;max-width:520px;height:140px;position:relative;
  border:3px solid #440088;border-radius:4px;overflow:hidden;
  background:linear-gradient(180deg,#1a0a30 0%,#0e0820 60%,#1a0a10 100%);
}
#battle-arena-bg{position:absolute;inset:0;}
#battle-arena-floor{position:absolute;bottom:0;left:0;right:0;height:35px;background:linear-gradient(180deg,#2a1840,#1a0e30);}
.arena-fighter{position:absolute;bottom:35px;display:flex;flex-direction:column;align-items:center;gap:2px;}
.arena-fighter.player-pos{left:30px;}
.arena-fighter.enemy-pos{right:30px;}
.arena-sprite{image-rendering:pixelated;display:block;}
.arena-shadow{width:40px;height:6px;background:rgba(0,0,0,0.5);border-radius:50%;margin-top:-4px;}
.battle-fighters{display:flex;justify-content:space-between;width:100%;max-width:520px;gap:8px;}
.fighter-box{
  background:#0e0022;border:2px solid #440088;border-radius:4px;
  padding:8px 10px;flex:1;
  box-shadow:inset 0 0 12px rgba(100,0,180,0.2);
}
.fighter-box.player-side{border-color:#2255cc;box-shadow:inset 0 0 12px rgba(30,80,200,0.25);}
.fighter-box.enemy-side{border-color:#cc2222;box-shadow:inset 0 0 12px rgba(200,30,30,0.25);}
.fighter-name{font-size:7px;color:#cc88ff;margin-bottom:5px;letter-spacing:1px;}
.fighter-name.player-name{color:#6699ff;}
.fighter-name.enemy-name{color:#ff7766;}
.stat-bar-wrap{height:9px;background:#0a0018;border:1px solid #330055;border-radius:2px;margin:3px 0;overflow:hidden;}
.stat-bar-fill{height:100%;border-radius:1px;transition:width 0.35s;}
.hp-color{background:linear-gradient(90deg,#22cc44,#44ff88);}
.en-color{background:linear-gradient(90deg,#cc8800,#ffcc00);}
.stat-label{font-size:6px;color:#553377;margin-bottom:2px;}
.battle-log{
  width:100%;max-width:520px;
  background:#060010;border:2px solid #2a0044;border-radius:3px;
  padding:8px;height:72px;overflow-y:auto;
  font-size:6px;color:#997acc;line-height:2.2;
}
.log-hit{color:#ffcc44;}
.log-crit{color:#44ff88;text-shadow:0 0 4px #00cc44;}
.log-miss{color:#ff6644;}
.log-info{color:#7755aa;}
.battle-moves{display:flex;gap:6px;flex-wrap:wrap;width:100%;max-width:520px;justify-content:center;}
.move-btn{
  font-family:'Press Start 2P',monospace;font-size:6px;
  background:#0e0022;color:#cc88ff;
  border:2px solid #440088;border-radius:3px;
  padding:8px 10px;cursor:pointer;min-width:90px;text-align:center;
  box-shadow:inset 0 -2px 0 #220044;
  transition:all 0.1s;
}
.move-btn:hover:not(:disabled){
  background:#1a0038;border-color:#cc44ff;color:#ff88ff;
  box-shadow:inset 0 -2px 0 #440088,0 0 8px rgba(200,100,255,0.3);
}
.move-btn:active:not(:disabled){box-shadow:inset 0 2px 0 #220044;}
.move-btn:disabled{opacity:0.35;cursor:not-allowed;}
.move-btn.special{
  border-color:#aa8800;color:#ffcc00;
  box-shadow:inset 0 -2px 0 #664400,0 0 8px rgba(255,200,0,0.2);
}
.move-btn.danger{border-color:#882200;color:#ff8866;}
.move-btn.catch{border-color:#228844;color:#66ff99;}
.dice-display{
  font-size:13px;color:#ffcc44;text-align:center;
  min-height:22px;letter-spacing:2px;
  text-shadow:0 0 8px rgba(255,200,0,0.6);
}

/* ── ENCOUNTER FLASH ── */
#encounter-flash{position:absolute;inset:0;background:#ffffff;opacity:0;pointer-events:none;z-index:90;transition:opacity 0.1s;}

/* ── MINIMAP ── */
#minimap{position:absolute;top:8px;right:8px;background:rgba(8,0,20,0.85);border:1px solid #440088;border-radius:3px;padding:4px;}
#minimap canvas{display:block;image-rendering:pixelated;}
</style>
</head>
<body>
<div id="game-wrap">

<script>
// ═══════════════════════════════════════════════════════════
//  WORLDHATCH — Browser Top-Down Explorer
//  Pixel art tile engine, encounter system, battle engine
//  All self-contained — no server required.
// ═══════════════════════════════════════════════════════════

const TILE   = 24;  // 16-bit SNES style — bigger tiles
const VIEW_W = 13;
const VIEW_H = 10;

// ── TILE TYPES ────────────────────────────────────────────
const T = {

  GRASS:   1,   // tall grass — triggers encounters
  WALL:    2,
  WATER:   3,
  SAND:    4,
  PATH:    5,
  TREE:    6,
  FLOWER:  7,
  CAVE:    8,   // point of interest
  SHRINE:  9,   // point of interest
  RUIN:    10,  // point of interest
  NEST:    11,  // egg nest
  NPC:     12,
  CHEST:   13,
};

// ── 16-BIT TILE PALETTE — SNES quality ───────────────────
// Each tile has base, highlight, shadow, accent colors
const TILE_PAL = {
  [T.GROUND]: {base:'#3a5c20',hi:'#4a7228',sh:'#2a4418',acc:'#567830'},
  [T.GRASS]:  {base:'#1e7a0a',hi:'#28961a',sh:'#145606',acc:'#32aa22'},
  [T.WALL]:   {base:'#5a4030',hi:'#6e5040',sh:'#3e2c20',acc:'#7a5c44'},
  [T.WATER]:  {base:'#1840a8',hi:'#2858cc',sh:'#0e2c80',acc:'#4488ee'},
  [T.SAND]:   {base:'#c8a840',hi:'#e0c060',sh:'#a08028',acc:'#f0d870'},
  [T.PATH]:   {base:'#6a5838',hi:'#7e6c4a',sh:'#52442a',acc:'#8a7050'},
  [T.TREE]:   {base:'#1e6010',hi:'#2a7a18',sh:'#124408',acc:'#369028'},
  [T.FLOWER]: {base:'#3a5c20',hi:'#e0409a',sh:'#2a4418',acc:'#ff70bb'},
  [T.CAVE]:   {base:'#1a0828',hi:'#2a1040',sh:'#0e0418',acc:'#440066'},
  [T.SHRINE]: {base:'#6a3800',hi:'#8a4c00',sh:'#4a2800',acc:'#cc8820'},
  [T.RUIN]:   {base:'#484840',hi:'#585858',sh:'#303030',acc:'#686860'},
  [T.NEST]:   {base:'#3a2800',hi:'#c89800',sh:'#281800',acc:'#ffcc00'},
  [T.NPC]:    {base:'#3a5c20',hi:'#2255cc',sh:'#2a4418',acc:'#4477ff'},
  [T.CHEST]:  {base:'#3a5c20',hi:'#cc9900',sh:'#2a4418',acc:'#ffcc00'},
};

// ── REGION DEFINITIONS ───────────────────────────────────
const REGIONS = {

    ],
  },
  sakurami_highlands: {
    name: 'Sakurami Highlands',
    element: 'spirit',
    areas: ['Cherry Grove','Mountain Shrine','Deep Trench'],
    palette: { ground:'#2a3a18', grass:'#446610', path:'#554428', water:'#1a2a88' },
    creatures: [
      {id:'misthare',    name:'Misthare',    element:'spirit', hp:65, atk:14,def:8, spd:25,rarity:'common'},

      {id:'inkfox',      name:'Inkfox',      element:'dark',   hp:81, atk:31,def:12,spd:32,rarity:'uncommon'},
      {id:'thunderkoi',  name:'Thunderkoi',  element:'storm',  hp:78, atk:22,def:12,spd:23,rarity:'uncommon'},
      {id:'ashveil_crane',name:'Ashveil Crane',element:'fire', hp:114,atk:27,def:14,spd:19,rarity:'rare'},
      {id:'frostpetal_oni',name:'Frostpetal Oni',element:'ice',hp:115,atk:24,def:22,spd:15,rarity:'rare'},
      {id:'ryujin_serpent',name:'Ryujin Serpent',element:'spirit',hp:107,atk:23,def:13,spd:36,rarity:'legendary'},

      {id:'coldcrest_raptor',name:'Coldcrest Raptor',element:'ice',  hp:88, atk:30,def:9, spd:28,rarity:'uncommon'},
      {id:'stormtusk_boar', name:'Stormtusk Boar',   element:'storm', hp:78, atk:22,def:12,spd:23,rarity:'uncommon'},
      {id:'avalanche_golem',name:'Avalanche Golem',  element:'ice',  hp:203,atk:38,def:47,spd:4, rarity:'rare'},
      {id:'jormunveil',     name:'Jormunveil',        element:'ice',  hp:157,atk:47,def:33,spd:18,rarity:'legendary'},
    ],
  },
  shadowmere_hollows: {
    name: 'Shadowmere Hollows',

    areas: ['Dark Marsh','Ancient Castle','Moonlit Plains'],

    creatures: [
      {id:'marsh_lurker',  name:'Marsh Lurker',   element:'dark',  hp:70, atk:22,def:12,spd:18,rarity:'common'},

      {id:'moonveil_moth', name:'Moonveil Moth',   element:'spirit',hp:65, atk:14,def:8, spd:25,rarity:'common'},
      {id:'bog_golem',     name:'Bog Golem',        element:'nature',hp:109,atk:18,def:21,spd:10,rarity:'uncommon'},
      {id:'frostshade_wolf',name:'Frostshade Wolf',element:'ice',   hp:86, atk:23,def:12,spd:21,rarity:'uncommon'},
      {id:'castle_wraith', name:'Castle Wraith',   element:'dark',  hp:95, atk:30,def:16,spd:24,rarity:'rare'},
      {id:'void_sovereign',name:'Void Sovereign',  element:'dark',  hp:131,atk:64,def:29,spd:41,rarity:'legendary'},
    ],
  },
};

// ── MAP GENERATOR ────────────────────────────────────────
const MAP_W = 48;
const MAP_H = 48;

function generateMap(regionId) {
  const map    = [];
  const region = REGIONS[regionId] || REGIONS.suncrest_expanse;

  // Fill base
  for (let y = 0; y < MAP_H; y++) {
    map[y] = [];
    for (let x = 0; x < MAP_W; x++) {
      const n = noise(x * 0.15, y * 0.15);
      if (n > 0.6)      map[y][x] = T.WALL;
      else if (n > 0.4) map[y][x] = T.GRASS;
      else              map[y][x] = T.GROUND;
    }
  }

  // Carve a path through the middle
  for (let x = 4; x < MAP_W - 4; x++) map[Math.floor(MAP_H/2)][x] = T.PATH;
  for (let y = 4; y < MAP_H - 4; y++) map[y][Math.floor(MAP_W/2)] = T.PATH;

  // Water body
  for (let y = 8; y < 14; y++)
    for (let x = 36; x < 44; x++)
      map[y][x] = T.WATER;

  // Trees cluster
  for (let y = 30; y < 38; y++)
    for (let x = 6; x < 16; x++)
      if (noise(x * 0.4, y * 0.4) > 0.5) map[y][x] = T.TREE;

  // Points of interest
  placePoI(map, T.CAVE,   10, 10);
  placePoI(map, T.SHRINE, 38, 36);
  placePoI(map, T.RUIN,   14, 38);

  // Egg nests (4 hidden in tall grass)
  const nestSpots = [[8,6],[40,20],[20,40],[6,34]];
  nestSpots.forEach(([x,y]) => {
    if (map[y][x] === T.GRASS || map[y][x] === T.GROUND)
      map[y][x] = T.NEST;
  });

  // Flowers scattered
  for (let i = 0; i < 30; i++) {
    const x = 2 + Math.floor(Math.random() * (MAP_W - 4));
    const y = 2 + Math.floor(Math.random() * (MAP_H - 4));
    if (map[y][x] === T.GROUND) map[y][x] = T.FLOWER;
  }

  // Border walls
  for (let x = 0; x < MAP_W; x++) { map[0][x] = T.WALL; map[MAP_H-1][x] = T.WALL; }
  for (let y = 0; y < MAP_H; y++) { map[y][0] = T.WALL; map[y][MAP_W-1] = T.WALL; }

  return map;
}

function placePoI(map, type, cx, cy) {
  for (let dy = -1; dy <= 1; dy++)
    for (let dx = -1; dx <= 1; dx++)
      if (cy+dy >= 0 && cy+dy < MAP_H && cx+dx >= 0 && cx+dx < MAP_W)
        map[cy+dy][cx+dx] = (dx===0&&dy===0) ? type : T.GROUND;
}

// Simple deterministic noise
function noise(x, y) {
  const s = Math.sin(x * 127.1 + y * 311.7) * 43758.5453;
  return s - Math.floor(s);
}

// ── GAME STATE ────────────────────────────────────────────
const state = {
  // Player
  playerName:  'Trainer',
  homeRegion:  'suncrest_expanse',
  px: 24, py: 24,   // player tile position
  playerDir: 'down',
  moving: false,
  stepCount: 0,

  // World
  currentRegion: 'suncrest_expanse',
  map: [],
  visitedNests: new Set(),
  visitedPoI:   new Set(),

  // Time & weather
  time: 8,           // 0-23 hours
  timeSpeed: 0.002,  // hours per frame
  weather: 'clear',  // clear, rain, fog, storm
  weatherTimer: 0,

  // Collection
  eggs:      [],
  creatures: [],
  coins:     200,
  activeCreatureIdx: -1,

  // Battle
  inBattle:   false,
  battleState: null,

  // Dialog
  inDialog:   false,

  // Input
  keys: {},

  // Camera
  camX: 0, camY: 0,
};

// ── INPUT ─────────────────────────────────────────────────
document.addEventListener('keydown', e => {

});

// Mobile D-pad (touch)
function addTouch(id, key) {

  if (!el) return;

// ── MOVEMENT ──────────────────────────────────────────────
let moveTimer = 0;
const MOVE_DELAY = 150; // ms between steps

function handleMovement(dt) {
  if (state.inBattle || state.inDialog) return;
  moveTimer += dt;
  if (moveTimer < MOVE_DELAY) return;

  let dx = 0, dy = 0;
  const k = state.keys;
  if (k['arrowleft']  || k['a']) { dx = -1; state.playerDir = 'left';  }
  if (k['arrowright'] || k['d']) { dx =  1; state.playerDir = 'right'; }
  if (k['arrowup']    || k['w']) { dy = -1; state.playerDir = 'up';    }
  if (k['arrowdown']  || k['s']) { dy =  1; state.playerDir = 'down';  }

  if (dx === 0 && dy === 0) return;
  moveTimer = 0;

  const nx = state.px + dx;
  const ny = state.py + dy;

  if (nx < 0 || nx >= MAP_W || ny < 0 || ny >= MAP_H) return;
  const tile = state.map[ny]?.[nx];
  if (tile === undefined) return;

  // Solid tiles
  if (tile === T.WALL || tile === T.TREE || tile === T.WATER) return;

  state.px = nx;
  state.py = ny;
  state.stepCount++;

  // Update camera
  state.camX = Math.max(0, Math.min(MAP_W - VIEW_W, state.px - Math.floor(VIEW_W/2)));
  state.camY = Math.max(0, Math.min(MAP_H - VIEW_H, state.py - Math.floor(VIEW_H/2)));

  // Grass encounter check
  if (tile === T.GRASS && Math.random() < 0.12) {
    triggerEncounter();
    return;
  }

  // Nest check
  if (tile === T.NEST) {
    const nestKey = `${nx},${ny}`;
    if (!state.visitedNests.has(nestKey)) {
      state.visitedNests.add(nestKey);
      triggerEggFind();
    }
  }

  // PoI check
  if (tile === T.CAVE || tile === T.SHRINE || tile === T.RUIN) {
    const poiKey = `${nx},${ny}`;
    if (!state.visitedPoI.has(poiKey)) {
      triggerPoI(tile);
    }
  }

  updateHUD();
}

// ── ENCOUNTER SYSTEM ─────────────────────────────────────
function triggerEncounter() {
  const region   = REGIONS[state.currentRegion];
  const pool     = region.creatures;
  // Weighted by rarity
  const weights  = pool.map(c => c.rarity === 'common' ? 50 : c.rarity === 'uncommon' ? 20 : c.rarity === 'rare' ? 6 : 1);
  const total    = weights.reduce((a,b) => a+b, 0);
  let r          = Math.random() * total;
  let wildTemplate = pool[0];
  for (let i = 0; i < pool.length; i++) {
    r -= weights[i];
    if (r <= 0) { wildTemplate = pool[i]; break; }
  }

  // Scale wild creature level
  const wildLevel  = Math.max(1, Math.floor(state.creatures.length * 2) + Math.floor(Math.random() * 4));
  const wildMult   = 1 + (wildLevel - 1) * 0.08;
  const wild = {
    ...wildTemplate,
    level:      wildLevel,
    currentHp:  Math.round(wildTemplate.hp * wildMult),
    maxHp:      Math.round(wildTemplate.hp * wildMult),
    attack:     Math.round(wildTemplate.atk * wildMult),
    defense:    Math.round(wildTemplate.def * wildMult),
    energy:     0,
    status:     null,
  };

  // Flash
  const flash = document.getElementById('encounter-flash');
  flash.style.opacity = '1';
  setTimeout(() => { flash.style.opacity = '0'; }, 120);
  setTimeout(() => { flash.style.opacity = '0.8'; }, 200);
  setTimeout(() => { flash.style.opacity = '0'; }, 280);

  if (state.activeCreatureIdx >= 0 && state.creatures[state.activeCreatureIdx]) {
    startBattle(state.creatures[state.activeCreatureIdx], wild, false);
  } else {
    showDialog(
      `Wild ${wild.name} appeared!`,
      `A wild ${wild.name} (Lv${wild.level}) leapt from the grass!\nYou have no active creature to battle with.`,
      [
        { label: 'Run away', fn: closeDialog },
      ]
    );
  }
}

function triggerEggFind() {
  const region   = REGIONS[state.currentRegion];
  const pool     = region.creatures;
  const weights  = pool.map(c => c.rarity === 'common' ? 50 : c.rarity === 'uncommon' ? 15 : c.rarity === 'rare' ? 4 : 1);
  const total    = weights.reduce((a,b) => a+b, 0);
  let r          = Math.random() * total;
  let species    = pool[0];
  for (let i = 0; i < pool.length; i++) {
    r -= weights[i];
    if (r <= 0) { species = pool[i]; break; }
  }

  const egg = {
    id:       Date.now(),
    speciesId: species.id,
    name:      `${species.name} Egg`,
    element:   species.element,
    rarity:    species.rarity,
    region:    state.currentRegion,
    cards:     [],
  };
  state.eggs.push(egg);

  // Replace nest tile with ground
  state.map[state.py][state.px] = T.GROUND;

  showDialog(
    '🥚 EGG FOUND!',
    `You discovered a ${species.name} Egg!\nRarity: ${species.rarity.toUpperCase()}\nElement: ${species.element.toUpperCase()}\n\nAdded to your collection.`,
    [{ label: 'Great!', fn: closeDialog }]
  );
  updateHUD();
}

function triggerPoI(tileType) {
  const names  = { [T.CAVE]:'Dark Cave', [T.SHRINE]:'Ancient Shrine', [T.RUIN]:'Old Ruins' };
  const msgs   = {
    [T.CAVE]:   'The cave entrance is cool and dark.\nYou sense powerful creatures lurk inside.',
    [T.SHRINE]: 'An ancient shrine glows faintly.\nYou feel your creatures grow stronger.\n\n+50 XP to all creatures!',
    [T.RUIN]:   'Crumbling ruins of an old civilization.\nYou find a coin pouch in the rubble.\n\n+30 coins!',
  };
  const key = `${state.px},${state.py}`;

  if (tileType === T.SHRINE) {
    state.creatures.forEach(c => {
      c.xp = (c.xp || 0) + 50;
      c.level = Math.max(1, Math.floor(c.xp / 100) + 1);
    });
  }
  if (tileType === T.RUIN) {
    state.coins += 30;
  }

  state.visitedPoI.add(key);
  showDialog(names[tileType] || 'Location', msgs[tileType] || 'Nothing here.',
    [{ label: 'Leave', fn: closeDialog }]);
  updateHUD();
}

function handleInteract() {
  if (state.inDialog) {
    closeDialog();
    return;
  }
  // Check adjacent tiles for NPCs/chests
  const dirs = [{dx:0,dy:-1},{dx:0,dy:1},{dx:-1,dy:0},{dx:1,dy:0}];
  for (const {dx, dy} of dirs) {
    const tx = state.px + dx, ty = state.py + dy;
    const tile = state.map[ty]?.[tx];
    if (tile === T.CHEST) {
      const reward = 10 + Math.floor(Math.random() * 40);
      state.coins += reward;
      state.map[ty][tx] = T.GROUND;
      showDialog('TREASURE CHEST', `You found ${reward} coins!`, [{label:'Take it!', fn:closeDialog}]);
      updateHUD();
      return;
    }
  }
}

function handleEsc() {
  if (state.inBattle || state.inDialog) return;
  showMainMenu();
}

// ── BATTLE SYSTEM ─────────────────────────────────────────

// Element circle: each beats the next, weak to previous
const ELEM_CIRCLE = ['fire','nature','ice','storm','spirit','dark','water','sand','magma','crystal'];

function getTypeMult(atkElem, defElem) {
  const ai = ELEM_CIRCLE.indexOf(atkElem);
  const di = ELEM_CIRCLE.indexOf(defElem);
  if (ai < 0 || di < 0) return 1.0;
  const len = ELEM_CIRCLE.length;
  if ((ai + 1) % len === di) return 1.5;
  if ((ai - 1 + len) % len === di) return 0.5;
  return 1.0;
}

function rollD20() { return Math.floor(Math.random() * 20) + 1; }

function getOutcome(roll) {
  if (roll === 1)  return {label:'CRITICAL FAIL!', mult:0,    energy:-15, cls:'log-miss'};
  if (roll <= 5)   return {label:'Weak Hit',        mult:0.25, energy:5,   cls:'log-info'};
  if (roll <= 10)  return {label:'Hit',             mult:0.75, energy:10,  cls:'log-info'};
  if (roll <= 15)  return {label:'Strong Hit!',     mult:1.0,  energy:15,  cls:'log-hit'};
  if (roll <= 19)  return {label:'Heavy Hit!!',     mult:1.25, energy:20,  cls:'log-hit'};
  return                  {label:'CRITICAL HIT!!!', mult:2.0,  energy:35,  cls:'log-crit'};
}

let battleData = null;

function startBattle(playerCreature, wildCreature, isSurrender) {
  battleData = {
    player:  { ...playerCreature, energy: playerCreature.energy || 0, currentHp: playerCreature.currentHp || playerCreature.hp, maxHp: playerCreature.hp },
    enemy:   { ...wildCreature },
    turn:    'player',
    over:    false,
    canCatch: true,
  };

  state.inBattle = true;
  const overlay = document.getElementById('battle-overlay');
  overlay.classList.add('show');

  document.getElementById('b-player-name').textContent = playerCreature.name.toUpperCase();
  document.getElementById('b-enemy-name').textContent  = `WILD ${wildCreature.name.toUpperCase()}`;
  document.getElementById('b-enemy-elem').textContent  = wildCreature.element.toUpperCase();

  updateBattleUI();
  buildMoveButtons();
  // Draw creature sprites in arena
  renderBattleArena();
  drawCreatureSprite('player-sprite', playerCreature.element, false);
  drawCreatureSprite('enemy-sprite',  wildCreature.element,   true);
  startArenaAnim();
  blogLog(`Wild ${wildCreature.name} appeared! (Lv${wildCreature.level})`, 'log-info');
  blogLog(`${playerCreature.name} vs ${wildCreature.name}!`, 'log-info');

  // Initiative roll
  const pRoll = rollD20(), eRoll = rollD20();
  blogLog(`Initiative — You: ${pRoll} | Enemy: ${eRoll}`, 'log-info');
  if (eRoll > pRoll) {
    battleData.turn = 'enemy';
    blogLog(`${wildCreature.name} goes first!`, 'log-info');
    setTimeout(enemyTurn, 1200);
  } else {
    blogLog(`${playerCreature.name} goes first!`, 'log-info');
  }
}

function blogLog(msg, cls='') {
  const log = document.getElementById('battle-log');
  const line = document.createElement('div');
  line.className = cls;
  line.textContent = msg;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
}

function updateBattleUI() {
  if (!battleData) return;
  const p = battleData.player, e = battleData.enemy;
  document.getElementById('b-player-hp').style.width = Math.max(0,(p.currentHp/p.maxHp)*100)+'%';
  document.getElementById('b-player-hp-txt').textContent = `${p.currentHp}/${p.maxHp}`;
  document.getElementById('b-player-en').style.width = (p.energy)+'%';
  document.getElementById('b-enemy-hp').style.width  = Math.max(0,(e.currentHp/e.maxHp)*100)+'%';
  document.getElementById('b-enemy-hp-txt').textContent = `${e.currentHp}/${e.maxHp}`;
}

function buildMoveButtons() {
  const wrap = document.getElementById('battle-moves');
  wrap.innerHTML = '';

  const moves = [
    { label: 'BASE ATTACK',  id:'base',    cls:'',       disabled:false },
    { label: 'POWER STRIKE', id:'power',   cls:'',       disabled:false },
    { label: 'SPECIAL ⚡',   id:'special', cls:'special',disabled: battleData.player.energy < 100 },
    { label: 'CATCH',        id:'catch',   cls:'catch',  disabled:false },
    { label: 'RUN',          id:'run',     cls:'danger', disabled:false },
  ];

  moves.forEach(m => {
    const btn = document.createElement('button');
    btn.className   = `move-btn ${m.cls}`;
    btn.textContent = m.label;
    btn.disabled    = m.disabled;
    btn.onclick     = () => playerAction(m.id);
    wrap.appendChild(btn);
  });
}

async function playerAction(actionId) {
  if (battleData.turn !== 'player' || battleData.over) return;
  disableMoveButtons(true);

  if (actionId === 'run') {
    blogLog('You ran away!', 'log-info');
    endBattle(false, false);
    return;
  }

  if (actionId === 'catch') {
    const catchRoll = rollD20();
    await showDice(catchRoll, 'CATCH ATTEMPT');
    const hpFactor = battleData.enemy.currentHp / battleData.enemy.maxHp;
    const chance   = (1 - hpFactor) * 0.7 + 0.1;
    if (Math.random() < chance) {
      blogLog(`Caught ${battleData.enemy.name}!`, 'log-crit');
      // Add as egg/creature
      const caught = {
        ...battleData.enemy,
        name:      battleData.enemy.name,
        currentHp: battleData.enemy.maxHp,
        xp:        0,
        level:     battleData.enemy.level,
        energy:    0,
        status:    null,
      };
      state.creatures.push(caught);
      if (state.activeCreatureIdx < 0) state.activeCreatureIdx = 0;
      blogLog(`${caught.name} joined your team!`, 'log-crit');
      endBattle(true, true);
    } else {
      blogLog(`${battleData.enemy.name} broke free!`, 'log-miss');
      blogLog(`Tip: weaken it first for better catch odds.`, 'log-info');
      battleData.turn = 'enemy';
      setTimeout(enemyTurn, 800);
    }
    return;
  }

  // Attack
  const roll    = rollD20();
  await showDice(roll, 'YOUR ATTACK');
  const outcome = getOutcome(roll);
  blogLog(`Roll: ${roll} — ${outcome.label}`, outcome.cls);

  if (outcome.mult > 0) {
    const p        = battleData.player;
    const e        = battleData.enemy;
    const typeMult = getTypeMult(p.element, e.element);
    if (typeMult > 1) blogLog('Super effective!', 'log-crit');
    if (typeMult < 1) blogLog('Not very effective...', 'log-info');

    const powerBoost = actionId === 'power' ? 1.5 : actionId === 'special' ? 2.5 : 1.0;
    const dmg = Math.max(1, Math.round((p.attack / e.defense) * 15 * outcome.mult * typeMult * powerBoost));

    e.currentHp = Math.max(0, e.currentHp - dmg);
    blogLog(`${p.name} deals ${dmg} damage!`, 'log-hit');

    // Energy gain
    p.energy = Math.min(100, p.energy + outcome.energy);
    if (actionId === 'special') p.energy = 0;
  }

  updateBattleUI();

  if (battleData.enemy.currentHp <= 0) {
    blogLog(`${battleData.enemy.name} fainted!`, 'log-crit');
    const xpGain = battleData.enemy.level * 12;
    const pc = state.creatures[state.activeCreatureIdx];
    if (pc) {
      pc.xp    = (pc.xp || 0) + xpGain;
      pc.level = Math.max(1, Math.floor(pc.xp / 100) + 1);
      blogLog(`${pc.name} gained ${xpGain} XP! (Lv${pc.level})`, 'log-crit');
    }
    state.coins += Math.floor(battleData.enemy.level * 3);
    endBattle(true, false);
    return;
  }

  battleData.turn = 'enemy';
  setTimeout(enemyTurn, 800);
}

async function enemyTurn() {
  if (battleData.over) return;
  const e = battleData.enemy;
  const p = battleData.player;

  const roll    = rollD20();
  await showDice(roll, `${e.name} ATTACKS`);
  const outcome = getOutcome(roll);
  blogLog(`${e.name} roll: ${roll} — ${outcome.label}`, outcome.cls);

  if (outcome.mult > 0) {
    const typeMult = getTypeMult(e.element, p.element);
    if (typeMult > 1) blogLog('Super effective!', 'log-crit');
    const dmg = Math.max(1, Math.round((e.attack / p.defense) * 12 * outcome.mult * typeMult));
    p.currentHp = Math.max(0, p.currentHp - dmg);

    // Update stored creature HP
    if (state.activeCreatureIdx >= 0 && state.creatures[state.activeCreatureIdx]) {
      state.creatures[state.activeCreatureIdx].currentHp = p.currentHp;
    }

    blogLog(`${e.name} deals ${dmg} damage!`, 'log-hit');
  }

  updateBattleUI();
  updateHUD();

  if (p.currentHp <= 0) {
    blogLog(`${p.name} fainted!`, 'log-miss');
    endBattle(false, false);
    return;
  }

  battleData.turn = 'player';
  disableMoveButtons(false);
  buildMoveButtons();
}

function showDice(roll, label) {
  return new Promise(resolve => {
    const el = document.getElementById('dice-display');
    let i = 0;
    const interval = setInterval(() => {
      el.textContent = `${label}: [${Math.floor(Math.random()*20)+1}]`;
      i++;
      if (i > 10) {
        clearInterval(interval);
        el.textContent = `${label}: [${roll}] — ${getOutcome(roll).label}`;
        resolve();
      }
    }, 70);
  });
}

function disableMoveButtons(disabled) {
  document.querySelectorAll('.move-btn').forEach(b => b.disabled = disabled);
}

// ── BATTLE ARENA RENDERING ────────────────────────────────
function renderBattleArena() {
  const bg  = document.getElementById('battle-arena-bg');
  if (!bg) return;
  bg.width  = bg.clientWidth  || 520;
  bg.height = bg.clientHeight || 140;
  const c   = bg.getContext('2d');

  // Sky
  c.fillStyle = '#12082a'; c.fillRect(0, 0, bg.width, bg.height);

  // Stars
  const stars = [[20,10],[80,20],[150,8],[230,15],[310,6],[400,12],[480,18],[50,35],[180,28],[350,30],[460,22]];
  stars.forEach(([x,y]) => {
    const b = Math.sin(Date.now()*0.002 + x) * 0.3 + 0.7;
    c.fillStyle = `rgba(255,255,220,${b})`;
    c.fillRect(x, y, 2, 2);
  });

  // Distant mountains
  c.fillStyle = '#1a0a30';
  [[0,80],[60,60],[130,70],[200,55],[280,65],[360,58],[430,72],[500,60],[560,80]].forEach(([x,h],i,arr)=>{
    if (i<arr.length-1) {
      c.beginPath();
      c.moveTo(x, bg.height);
      c.lineTo(x, h);
      c.lineTo(arr[i+1][0], arr[i+1][1]);
      c.lineTo(arr[i+1][0], bg.height);
      c.fill();
    }
  });

  // Ground platform
  c.fillStyle = '#2a1040'; c.fillRect(0, bg.height-35, bg.width, 35);
  c.fillStyle = '#3a1a50'; c.fillRect(0, bg.height-35, bg.width, 6);
  // Ground pattern
  for (let x=0; x<bg.width; x+=16) {
    c.fillStyle = (Math.floor(x/16)+1)%2===0 ? '#321848':'#2a1040';
    c.fillRect(x, bg.height-29, 16, 29);
  }
  c.fillStyle = '#4a2060'; c.fillRect(0, bg.height-35, bg.width, 3);
}

function drawCreatureSprite(canvasId, element, isEnemy) {
  const cv = document.getElementById(canvasId);
  if (!cv) return;
  const c  = cv.getContext('2d');
  c.clearRect(0, 0, 32, 32);

  const ELEM_COLORS = {
    fire:   ['#ff6600','#ff9900','#cc3300','#ffcc44','#ff3300'],
    ice:    ['#88ddff','#aaeeff','#4499cc','#ccf4ff','#2266aa'],
    nature: ['#44bb22','#66dd44','#226600','#aaffaa','#334d00'],
    spirit: ['#ffcc44','#ffee88','#cc9900','#fff4aa','#886600'],
    dark:   ['#8833cc','#aa55ee','#440088','#cc88ff','#220044'],
    storm:  ['#8866ff','#aaaaff','#4422cc','#ccccff','#221188'],
    water:  ['#2266cc','#4488ee','#114488','#88bbff','#002244'],
    sand:   ['#cc9933','#eecc55','#886600','#ffee88','#443300'],
    magma:  ['#cc2200','#ff4400','#881100','#ff8844','#440000'],
    crystal:['#88ccff','#aaeeff','#4488cc','#ddf4ff','#224466'],
  };

  const ec = ELEM_COLORS[element] || ELEM_COLORS.dark;
  const [mc, lc, dc, hlc, sc] = ec;
  const flip = isEnemy ? -1 : 1;

  const q = (x, y, w, h, col) => {
    c.fillStyle = col;
    if (flip < 0) c.fillRect(32-x-w, y, w, h);
    else          c.fillRect(x, y, w, h);
  };

  // Body based on element archetype
  if (['fire','magma'].includes(element)) {
    // Spiky angular body
    q(8,14, 16, 14, dc);
    q(9,12, 14, 14, mc);
    q(10,10,12, 12, lc);
    q(12,8,  8, 6,  lc);   // neck
    q(11,4,  10,8,  mc);   // head
    q(12,5,  8, 6,  lc);
    // Spines on back
    q(6, 10, 3, 8, lc);
    q(4, 8,  3, 6, hlc);
    q(23,10, 3, 8, dc);
    q(9, 4,  3, 6, lc);
    q(7, 2,  3, 5, hlc);
    // Eyes
    q(13,6, 2, 2, '#ff2200'); q(14,6,1,1,'#ffffff');
    q(18,6, 2, 2, '#ff2200'); q(18,6,1,1,'#ffffff');
    // Legs
    q(9, 26, 5, 6, dc); q(18, 26, 5, 6, dc);
    q(8, 28, 5, 4, sc); q(17, 28, 5, 4, sc);
    // Glow
    c.fillStyle = `rgba(255,100,0,0.18)`;
    c.fillRect(4,4,24,24);
  } else if (['ice','crystal'].includes(element)) {
    // Angular crystalline body
    q(10,16, 12, 12, dc);
    q(9, 14, 14, 12, mc);
    q(10,12, 12, 10, lc);
    q(12,8,  8,  8,  lc);  // head
    q(13,7,  6,  7,  hlc);
    // Crystal shards
    q(6, 6,  4, 10, lc); q(7,4,2,4,hlc);
    q(22,8,  4, 8,  mc);  q(23,6,2,4,lc);
    q(14,2,  4, 6,  hlc); q(15,1,2,3,'#ffffff');
    // Eyes
    q(13,9, 2, 2, '#0044ff'); q(14,9,1,1,'#aaeeff');
    q(18,9, 2, 2, '#0044ff'); q(18,9,1,1,'#aaeeff');
    // Legs
    q(10,27, 4, 5, dc); q(18,27, 4, 5, dc);
  } else if (['nature','water'].includes(element)) {
    // Round organic body
    q(8, 16, 16, 14, dc);
    q(7, 14, 18, 14, mc);
    q(8, 12, 16, 12, lc);
    q(10,8,  12, 10, mc);  // head
    q(11,7,  10, 8, lc);
    q(12,6,  8,  6, hlc);
    // Leaf/fin decorations
    q(4, 12, 5, 10, lc);  q(3,10,4,6,mc);
    q(23,12, 5, 10, lc);  q(25,10,4,6,mc);
    // Eyes
    q(12,9, 3, 3, '#00aa22'); q(13,9,1,2,'#ffffff');
    q(18,9, 3, 3, '#00aa22'); q(18,9,1,2,'#ffffff');
    // Legs
    q(9, 28, 5, 4, dc); q(18,28, 5, 4, dc);
    // Spots
    q(12,14,2,2, hlc); q(17,16,2,2, hlc);
  } else if (['dark','spirit'].includes(element)) {
    // Sleek mysterious body
    q(10,18, 12, 12, dc);
    q(9, 16, 14, 12, mc);
    q(10,12, 12, 10, mc);
    q(12,7,  8,  9,  mc);  // head
    q(13,6,  6,  8, lc);
    q(14,5,  4,  6, hlc);
    // Ears
    q(11,3, 3, 6, mc); q(12,2,2,4,lc);
    q(19,3, 3, 6, mc); q(19,2,2,4,lc);
    // Tail
    q(22,18, 4, 12, mc); q(23,16,3,4,lc);
    q(24,14, 4, 6, lc);  q(25,12,3,4,hlc);
    // Eyes
    q(13,8, 2, 3, hlc); q(14,8,1,1,'#ffffff');
    q(18,8, 2, 3, hlc); q(18,8,1,1,'#ffffff');
    // Legs
    q(10,28,4,4,dc); q(17,28,4,4,dc);
    // Aura
    c.fillStyle = `rgba(150,0,255,0.15)`;
    c.fillRect(2,2,28,28);
  } else if (['storm','sand'].includes(element)) {
    // Broad powerful body
    q(7, 17, 18, 13, dc);
    q(8, 14, 16, 13, mc);
    q(9, 12, 14, 10, lc);
    q(10,8,  12, 9,  mc);  // head
    q(11,7,  10, 8, lc);
    // Horns / tusks
    q(9,4,  4, 6, lc);  q(8,2,3,5,hlc);
    q(19,4, 4, 6, lc);  q(21,2,3,5,hlc);
    // Eyes
    q(12,9, 3, 2, '#ffdd00'); q(13,9,1,1,'#ffffff');
    q(17,9, 3, 2, '#ffdd00'); q(17,9,1,1,'#ffffff');
    // Legs
    q(8, 28,5,4,dc); q(19,28,5,4,dc);
    q(7, 27,5,2,sc); q(18,27,5,2,sc);
  }

  // Outline pass
  c.globalCompositeOperation = 'destination-over';
  c.fillStyle = sc;
  c.fillRect(0,0,32,32);
  c.globalCompositeOperation = 'source-over';
}

let arenaAnimId = null;
function startArenaAnim() {
  if (arenaAnimId) cancelAnimationFrame(arenaAnimId);
  function loop() {
    renderBattleArena();
    if (battleData && !battleData.over) arenaAnimId = requestAnimationFrame(loop);
  }
  loop();
}

function endBattle(won, caught) {
  battleData.over = true;
  state.inBattle  = false;

  setTimeout(() => {
    document.getElementById('battle-overlay').classList.remove('show');
    document.getElementById('battle-log').innerHTML = '';
    document.getElementById('dice-display').textContent = '';
    battleData = null;

    if (!won && !caught) {
      // Heal to 30% if fainted
      if (state.activeCreatureIdx >= 0 && state.creatures[state.activeCreatureIdx]) {
        const c = state.creatures[state.activeCreatureIdx];
        c.currentHp = Math.max(1, Math.floor(c.hp * 0.3));
      }
    }
    updateHUD();
  }, 1500);
}

// ── DIALOG SYSTEM ─────────────────────────────────────────
function showDialog(name, text, options) {
  state.inDialog = true;
  document.getElementById('dialog').style.display = 'block';
  document.getElementById('dialog-name').textContent = name;
  document.getElementById('dialog-text').textContent = text;
  const optWrap = document.getElementById('dialog-options');
  optWrap.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className   = 'primary d-btn';
    btn.textContent = opt.label;
    btn.onclick     = opt.fn;
    optWrap.appendChild(btn);
  });
}

function closeDialog() {
  state.inDialog = false;
  document.getElementById('dialog').style.display = 'none';
}

// ── MAIN MENU DIALOG ──────────────────────────────────────
function showMainMenu() {
  const pc = state.creatures[state.activeCreatureIdx];
  showDialog(
    'WORLDHATCH MENU',
    `Eggs: ${state.eggs.length}  |  Creatures: ${state.creatures.length}  |  Coins: ${state.coins}\nActive: ${pc ? pc.name + ' Lv' + pc.level : 'none'}`,
    [
      { label: 'Switch Region',   fn: showRegionMenu },
      { label: 'Switch Creature', fn: showCreatureMenu },
      { label: 'Hatch Egg',       fn: showHatchMenu },
      { label: 'Close',           fn: closeDialog },
    ]
  );
}

function showRegionMenu() {
  closeDialog();
  const regionIds = Object.keys(REGIONS);
  const opts = regionIds.map(rid => ({
    label: REGIONS[rid].name,
    fn: () => { switchRegion(rid); closeDialog(); }
  }));
  opts.push({ label: 'Cancel', fn: closeDialog });
  showDialog('TRAVEL TO REGION', 'Choose a region to explore:', opts);
}

function switchRegion(regionId) {
  state.currentRegion = regionId;
  state.map           = generateMap(regionId);
  state.px = 24; state.py = 24;
  state.camX = 14; state.camY = 14;
  state.visitedNests  = new Set();
  state.visitedPoI    = new Set();
  document.getElementById('top-region').textContent = REGIONS[regionId].name;
  document.getElementById('top-player').textContent = `${state.playerName} — ${REGIONS[regionId].name.toUpperCase()}`;
}

function showCreatureMenu() {
  closeDialog();
  if (!state.creatures.length) {
    showDialog('CREATURES', 'No creatures yet!\nCatch some in battle or hatch eggs.', [{label:'OK', fn:closeDialog}]);
    return;
  }
  const opts = state.creatures.map((c, i) => ({
    label: `${c.name} Lv${c.level || 1} [${c.element}] HP:${c.currentHp||c.hp}/${c.hp}`,
    fn: () => { state.activeCreatureIdx = i; closeDialog(); updateHUD(); }
  }));
  opts.push({ label: 'Cancel', fn: closeDialog });
  showDialog('CHOOSE ACTIVE CREATURE', 'Pick your battle companion:', opts);
}

function showHatchMenu() {
  closeDialog();
  if (!state.eggs.length) {
    showDialog('EGGS', 'No eggs!\nFind egg nests marked with golden tiles on the map.', [{label:'OK', fn:closeDialog}]);
    return;
  }
  const opts = state.eggs.map((egg, i) => ({
    label: `${egg.name} [${egg.rarity.toUpperCase()}]`,
    fn: () => hatchEgg(i)
  }));
  opts.push({ label: 'Cancel', fn: closeDialog });
  showDialog('HATCH AN EGG', 'Choose an egg to hatch:', opts);
}

function hatchEgg(idx) {
  const egg = state.eggs[idx];
  if (!egg) return;

  // D20 stat rolls
  const region  = REGIONS[egg.region] || REGIONS.suncrest_expanse;
  const species = region.creatures.find(c => c.id === egg.speciesId) ||
                  region.creatures[0];

  const rollStat = (base) => {
    const r = rollD20();
    const m = r === 1 ? 0.5 : r <= 5 ? 0.75 : r <= 10 ? 0.9 : r <= 15 ? 1.0 : r <= 19 ? 1.15 : 1.5;
    return { final: Math.max(1, Math.round(base * m)), roll: r };
  };

  const hpRoll  = rollStat(species.hp);
  const atkRoll = rollStat(species.atk);
  const defRoll = rollStat(species.def);
  const spdRoll = rollStat(species.spd);

  const creature = {
    ...species,
    hp:        hpRoll.final,
    atk:       atkRoll.final,
    attack:    atkRoll.final,
    defense:   defRoll.final,
    speed:     spdRoll.final,
    currentHp: hpRoll.final,
    maxHp:     hpRoll.final,
    xp:        0,
    level:     1,
    energy:    0,
    status:    null,
    hatchedIn: egg.region,
    id:        Date.now(),
  };

  state.eggs.splice(idx, 1);
  state.creatures.push(creature);
  if (state.activeCreatureIdx < 0) state.activeCreatureIdx = state.creatures.length - 1;

  const mutations = [];
  if (hpRoll.roll === 20)  mutations.push('Perfect HP!');
  if (atkRoll.roll === 20) mutations.push('Perfect ATK!');
  if (Math.random() < 0.15) mutations.push('Shadow Stripe mutation!');

  const mutTxt = mutations.length ? `\nMutations: ${mutations.join(', ')}` : '';
  showDialog(
    `✨ ${creature.name} HATCHED!`,
    `HP:  ${creature.hp} (rolled ${hpRoll.roll})\n` +
    `ATK: ${creature.attack} (rolled ${atkRoll.roll})\n` +
    `DEF: ${creature.defense} (rolled ${defRoll.roll})\n` +
    `SPD: ${creature.speed} (rolled ${spdRoll.roll})${mutTxt}`,
    [{ label: 'Amazing!', fn: closeDialog }]
  );
  updateHUD();
}

// ── TIME & WEATHER ────────────────────────────────────────
function updateTimeWeather(dt) {
  state.time = (state.time + state.timeSpeed * dt) % 24;
  state.weatherTimer -= dt;

  if (state.weatherTimer <= 0) {
    const weathers = ['clear','clear','clear','rain','fog','storm'];
    state.weather  = weathers[Math.floor(Math.random() * weathers.length)];
    state.weatherTimer = 30000 + Math.random() * 60000;
  }

  const hour  = Math.floor(state.time);
  const isDay = hour >= 6 && hour < 20;
  const timeStr = `${String(hour).padStart(2,'0')}:00`;
  const icon  = isDay ? '☀' : '🌙';
  const wIcon = state.weather === 'clear' ? '' : state.weather === 'rain' ? '🌧' : state.weather === 'fog' ? '🌫' : '⛈';
  document.getElementById('top-time').textContent = `${timeStr} ${icon} ${state.weather.toUpperCase()} ${wIcon}`;
}

// ── HUD UPDATE ────────────────────────────────────────────
function updateHUD() {
  const pc = state.activeCreatureIdx >= 0 ? state.creatures[state.activeCreatureIdx] : null;
  document.getElementById('hud-creature').textContent = pc ? `${pc.name} Lv${pc.level||1}` : '— none —';
  const hpPct = pc ? Math.max(0, (pc.currentHp / pc.hp) * 100) : 0;
  document.getElementById('hud-hp').style.width = hpPct + '%';
  document.getElementById('hud-hp').style.background = hpPct < 25 ? '#ff4444' : hpPct < 50 ? '#ffaa00' : '#44ff88';
  document.getElementById('hud-energy').textContent = pc ? `${pc.energy || 0}/100` : '0/100';
  document.getElementById('hud-en').style.width = pc ? (pc.energy || 0) + '%' : '0%';
  document.getElementById('hud-eggs').textContent     = state.eggs.length;
  document.getElementById('hud-creatures').textContent = state.creatures.length;
  document.getElementById('hud-coins').textContent     = state.coins;
}

// ── RENDERER ──────────────────────────────────────────────
let animFrame = 0;

function render() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const hour  = Math.floor(state.time);
  const isDay = hour >= 6 && hour < 20;
  const nightAlpha = isDay ? 0 : Math.min(0.6, (hour < 6 ? (6 - hour) / 6 : (hour - 20) / 4) * 0.6);

  for (let ty = 0; ty < VIEW_H; ty++) {
    for (let tx = 0; tx < VIEW_W; tx++) {
      const mx = state.camX + tx;
      const my = state.camY + ty;
      if (mx < 0 || my < 0 || mx >= MAP_W || my >= MAP_H) continue;
      const tile = state.map[my]?.[mx];
      if (tile === undefined) continue;

      const px = tx * TILE;
      const py = ty * TILE;
      drawTile(ctx, tile, px, py, mx, my);
      drawTileDetail(ctx, tile, px, py, mx, my);
    }
  }

  // Night overlay
  if (nightAlpha > 0) {
    ctx.fillStyle = `rgba(0,0,20,${nightAlpha})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  // Weather effects
  if (state.weather === 'rain') {
    for (let i = 0; i < 40; i++) {
      const rx = ((animFrame * 3 + i * 37) % (canvas.width + 20)) - 10;
      const ry = ((animFrame * 6 + i * 53) % (canvas.height + 10));
      ctx.fillStyle = 'rgba(160,180,255,0.5)';
      ctx.fillRect(rx, ry, 1, 6);
    }
  }
  if (state.weather === 'fog') {
    ctx.fillStyle = 'rgba(180,190,220,0.22)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = 'rgba(200,210,240,0.12)';
    const fogX = (animFrame * 0.3) % canvas.width;
    ctx.fillRect(-fogX, 0, canvas.width * 2, canvas.height);
  }
  if (state.weather === 'storm') {
    for (let i = 0; i < 60; i++) {
      const rx = ((animFrame * 5 + i * 29) % (canvas.width + 20)) - 10;
      const ry = ((animFrame * 8 + i * 41) % (canvas.height + 10));
      ctx.fillStyle = 'rgba(140,160,255,0.6)';
      ctx.fillRect(rx, ry, 1, 8);
    }
    if (animFrame % 120 < 3) {
      ctx.fillStyle = 'rgba(255,255,200,0.15)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
  }

  // Player
  drawPlayer(ctx);

  // Minimap
  drawMinimap();

  animFrame++;
}

// ── 16-BIT TILE RENDERER ─────────────────────────────────
function p(ctx, x, y, w, h, color) {
  ctx.fillStyle = color; ctx.fillRect(x, y, w, h);
}

function drawTile(ctx, tile, px, py, mx, my) {
  const pal = TILE_PAL[tile] || TILE_PAL[T.GROUND];
  const T24 = TILE;

  // Base fill with checkerboard variation
  const alt = (mx + my) % 2;
  ctx.fillStyle = alt ? pal.base : pal.sh;
  ctx.fillRect(px, py, T24, T24);

  // Top highlight edge
  ctx.fillStyle = pal.hi;
  ctx.fillRect(px, py, T24, 2);
  ctx.fillRect(px, py, 2, T24);

  // Bottom shadow edge
  ctx.fillStyle = pal.sh;
  ctx.fillRect(px, py + T24 - 2, T24, 2);
  ctx.fillRect(px + T24 - 2, py, 2, T24);
}

function drawTileDetail(ctx, tile, px, py, mx, my) {
  const pal  = TILE_PAL[tile] || TILE_PAL[T.GROUND];
  const af   = animFrame;
  const T24  = TILE;

  if (tile === T.GROUND) {
    // Grass texture patches
    const seed = (mx * 7 + my * 13) % 6;
    ctx.fillStyle = pal.hi;
    if (seed < 2) {
      p(ctx, px+3,  py+5,  3, 1, pal.hi);
      p(ctx, px+14, py+9,  3, 1, pal.hi);
      p(ctx, px+8,  py+16, 3, 1, pal.hi);
    }
    if (seed < 4) {
      p(ctx, px+18, py+4,  2, 1, pal.acc);
      p(ctx, px+6,  py+19, 2, 1, pal.acc);
    }
  }

  if (tile === T.GRASS) {
    // Rich layered grass blades with animation
    const sway = Math.sin(af * 0.04 + mx * 0.7) * 1;
    const sw2  = Math.sin(af * 0.05 + my * 0.9) * 1;
    // Blade cluster 1
    p(ctx, px+2+sway,  py+10, 2, 9,  pal.hi);
    p(ctx, px+3+sway,  py+8,  2, 4,  pal.acc);
    // Blade cluster 2
    p(ctx, px+8+sw2,   py+11, 2, 9,  pal.base);
    p(ctx, px+9+sw2,   py+8,  2, 5,  pal.hi);
    // Blade cluster 3
    p(ctx, px+15+sway, py+9,  2, 9,  pal.hi);
    p(ctx, px+16+sway, py+7,  2, 5,  pal.acc);
    // Blade cluster 4
    p(ctx, px+20+sw2,  py+10, 2, 8,  pal.base);
    // Dark ground between blades
    p(ctx, px+5,  py+18, 3, 3,  pal.sh);
    p(ctx, px+12, py+19, 3, 2,  pal.sh);
  }

  if (tile === T.TREE) {
    // Trunk
    p(ctx, px+9,  py+16, 6, 8,  '#5a3a18');
    p(ctx, px+10, py+16, 4, 8,  '#7a5228');
    // Root flare
    p(ctx, px+7,  py+21, 10, 3, '#4a3010');
    // Canopy — layered circles
    p(ctx, px+4,  py+6,  16, 12, pal.sh);
    p(ctx, px+6,  py+4,  12, 14, pal.base);
    p(ctx, px+8,  py+2,  8,  6,  pal.hi);
    p(ctx, px+5,  py+8,  14, 8,  pal.base);
    // Highlight cluster
    p(ctx, px+9,  py+4,  4,  3,  pal.acc);
    p(ctx, px+7,  py+7,  5,  4,  pal.hi);
    // Shadow underside
    p(ctx, px+6,  py+15, 12, 3,  pal.sh);
  }

  if (tile === T.WATER) {
    // Animated water layers
    const wv1 = Math.floor(af * 0.06 + mx * 0.5) % 3;
    const wv2 = Math.floor(af * 0.04 + my * 0.4) % 4;
    // Deep layer
    p(ctx, px, py+4,  T24, 8, pal.sh);
    p(ctx, px, py+12, T24, 8, pal.base);
    // Wave highlights
    const wx1 = ((mx*4 + af/4) % (T24-6));
    const ww1 = 4 + wv1;
    p(ctx, px+wx1, py+5,  ww1, 2, pal.acc);
    p(ctx, px+wx1, py+13, ww1, 2, pal.hi);
    const wfx = ((my*5 + af/3 + 8) % (T24-4));
    p(ctx, px+wfx, py+9, 6, 2, '#88bbff');
    // Foam edge
    if (wv2 === 0) p(ctx, px+2, py+3, 8, 1, '#aaccff');
    if (wv2 === 1) p(ctx, px+10, py+3, 8, 1, '#aaccff');
    // Sparkle
    if ((af + mx*3 + my*5) % 40 < 3)
      p(ctx, px+T24/2, py+T24/3, 2, 2, '#ffffff');
  }

  if (tile === T.WALL) {
    // Stone wall with mortar lines
    const row = my % 2;
    p(ctx, px+1,        py+2,  10, 9, pal.hi);
    p(ctx, px+12,       py+2,  10, 9, row ? pal.base : pal.hi);
    p(ctx, px+(row?6:0),py+12, 10, 9, pal.base);
    p(ctx, px+(row?0:6),py+12, 10, 9, pal.sh);
    // Mortar
    p(ctx, px, py+11, T24, 2, '#2a1808');
    p(ctx, px+(row?5:11), py+2, 2, 9, '#2a1808');
    // Lichen
    if ((mx*11+my*7)%5===0) p(ctx, px+4, py+4, 3, 2, '#3a5a20');
  }

  if (tile === T.PATH) {
    // Dirt path with pebbles
    const seed = (mx*5+my*11)%8;
    p(ctx, px+2, py+2, T24-4, T24-4, pal.hi);
    // Pebbles
    if (seed<4) { p(ctx,px+4, py+6, 3, 2, pal.sh); }
    if (seed<6) { p(ctx,px+14,py+14,2, 2, pal.sh); }
    if (seed<3) { p(ctx,px+8, py+18,4, 2, pal.acc); }
    // Worn tracks
    p(ctx, px+9, py, 6, T24, pal.base);
    p(ctx, px+10,py, 4, T24, pal.hi);
  }

  if (tile === T.CAVE) {
    // Cave entrance with depth
    p(ctx, px+4,  py+8,  16, 16, '#000000');
    p(ctx, px+6,  py+6,  12, 14, '#0a000f');
    // Rocky arch
    p(ctx, px+3,  py+6,  4,  4,  pal.acc);
    p(ctx, px+17, py+6,  4,  4,  pal.acc);
    p(ctx, px+5,  py+4,  14, 4,  pal.acc);
    p(ctx, px+6,  py+3,  12, 3,  pal.hi);
    // Dark glow inside
    const glow = Math.sin(af*0.05)*0.15+0.15;
    ctx.fillStyle = `rgba(80,0,120,${glow})`;
    ctx.fillRect(px+7, py+8, 10, 10);
    // Stalactites
    p(ctx, px+8,  py+8,  2, 4, '#221133');
    p(ctx, px+12, py+8,  2, 3, '#221133');
    p(ctx, px+16, py+8,  2, 5, '#221133');
  }

  if (tile === T.SHRINE) {
    // Stone base
    p(ctx, px+3,  py+18, 18, 5, '#553300');
    p(ctx, px+4,  py+17, 16, 3, '#664400');
    // Pillar
    p(ctx, px+9,  py+6,  6, 14, '#7a5c00');
    p(ctx, px+10, py+6,  4, 14, '#9a7800');
    // Top ornament
    p(ctx, px+6,  py+4,  12, 4,  '#aa8800');
    p(ctx, px+8,  py+2,  8,  4,  '#cc9900');
    p(ctx, px+10, py+1,  4,  3,  '#ffcc00');
    // Pulsing glow
    const shrine_glow = Math.sin(af*0.06)*0.35+0.55;
    ctx.fillStyle = `rgba(255,180,0,${shrine_glow*0.5})`;
    ctx.fillRect(px+7, py+2, 10, 14);
    p(ctx, px+11, py+8, 2, 6, `rgba(255,220,100,${shrine_glow})`);
  }

  if (tile === T.RUIN) {
    // Crumbled stone blocks
    p(ctx, px+1,  py+12, 8,  11, pal.hi);
    p(ctx, px+2,  py+11, 6,  2,  pal.acc);
    p(ctx, px+13, py+8,  9,  15, pal.base);
    p(ctx, px+14, py+7,  7,  3,  pal.acc);
    // Rubble
    p(ctx, px+9,  py+18, 4,  3,  pal.sh);
    p(ctx, px+5,  py+20, 5,  2,  pal.sh);
    // Cracks
    p(ctx, px+3,  py+14, 1,  6,  '#1a1a1a');
    p(ctx, px+15, py+10, 1,  5,  '#1a1a1a');
    // Moss
    p(ctx, px+1,  py+13, 4,  2,  '#2a5010');
    p(ctx, px+14, py+8,  3,  2,  '#2a5010');
  }

  if (tile === T.NEST) {
    // Egg nest — twigs and golden egg
    const pulse = Math.sin(af*0.08)*0.4+0.7;
    // Nest twigs
    p(ctx, px+4,  py+14, 16, 5,  '#6a4020');
    p(ctx, px+6,  py+12, 12, 5,  '#7a4c28');
    p(ctx, px+3,  py+15, 4,  3,  '#5a3418');
    p(ctx, px+17, py+15, 4,  3,  '#5a3418');
    // Egg
    ctx.fillStyle = `rgba(255,200,0,${pulse})`;
    ctx.fillRect(px+8, py+6, 8, 10);
    p(ctx, px+9,  py+5,  6, 10, `rgba(255,220,50,${pulse})`);
    p(ctx, px+10, py+4,  4, 10, '#ffe050');
    // Egg highlight
    p(ctx, px+10, py+6,  2, 3,  '#ffffff');
    // Glow halo
    ctx.fillStyle = `rgba(255,180,0,${pulse*0.3})`;
    ctx.fillRect(px+4, py+2, 16, 18);
  }

  if (tile === T.FLOWER) {
    // Flower patch — multiple blooms
    const fswap = Math.floor(af*0.02+mx) % 2;
    const fcol  = fswap ? '#ff66aa' : '#ffaa22';
    const fcol2 = fswap ? '#cc3388' : '#cc8800';
    p(ctx, px+3,  py+8,  3, 3, fcol);
    p(ctx, px+4,  py+7,  1, 1, '#ffffff');
    p(ctx, px+12, py+10, 3, 3, fcol2);
    p(ctx, px+13, py+9,  1, 1, '#ffffff');
    p(ctx, px+7,  py+14, 3, 3, fcol);
    p(ctx, px+8,  py+13, 1, 1, '#ffffff');
    p(ctx, px+18, py+7,  3, 3, fcol2);
    // Stems
    p(ctx, px+4,  py+11, 1, 4, '#2a7010');
    p(ctx, px+13, py+13, 1, 3, '#2a7010');
    p(ctx, px+8,  py+17, 1, 4, '#2a7010');
    p(ctx, px+19, py+10, 1, 5, '#2a7010');
  }

  if (tile === T.SAND) {
    // Desert sand with ripples
    const rip  = Math.floor(af*0.02+mx+my) % T24;
    p(ctx, px+0,  py+rip%8,     T24, 2, pal.hi);
    p(ctx, px+0,  py+(rip%8)+10,T24, 2, pal.acc);
    // Small rocks
    const sr = (mx*9+my*7)%7;
    if (sr<3) p(ctx, px+4, py+10, 4, 3, pal.sh);
    if (sr<5) p(ctx, px+16,py+16, 3, 2, pal.sh);
  }
}

// ── 16-BIT PLAYER SPRITE ─────────────────────────────────
function drawPlayer(ctx) {
  const sx  = (state.px - state.camX) * TILE;
  const sy  = (state.py - state.camY) * TILE;
  if (sx < -TILE || sy < -TILE || sx > VIEW_W * TILE || sy > VIEW_H * TILE) return;

  const af    = animFrame;
  const step  = Math.floor(af * 0.14) % 4; // 4-frame walk cycle
  const bob   = (step === 1 || step === 3) ? -1 : 0;
  const legA  = (step < 2) ? 1 : -1;
  const dir   = state.playerDir;
  const isMoving = Object.values(state.keys).some(v=>v);

  // Ground shadow
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath();
  ctx.ellipse(sx + 12, sy + 23, 7, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  // Scarf / cape (behind body) — direction specific
  if (dir === 'down' || dir === 'right' || dir === 'left') {
    p(ctx, sx+7, sy+7+bob, 10, 2, '#cc2200');
    p(ctx, sx+8, sy+9+bob, 8,  3, '#ee3300');
  }

  // Backpack
  if (dir === 'down') {
    // no backpack visible from front
  } else if (dir === 'up') {
    p(ctx, sx+6,  sy+8+bob, 4, 8, '#8844aa');
    p(ctx, sx+7,  sy+7+bob, 3, 7, '#9955bb');
    p(ctx, sx+14, sy+8+bob, 4, 8, '#8844aa');
  }

  // Legs — walking animation
  if (dir === 'down' || dir === 'up') {
    // Left leg
    p(ctx, sx+8,  sy+16+bob,       4, 6+legA, '#2244aa');
    p(ctx, sx+8,  sy+22+bob+legA,  4, 2,      '#3355cc');
    // Right leg
    p(ctx, sx+12, sy+16+bob,       4, 6-legA, '#2244aa');
    p(ctx, sx+12, sy+22+bob-legA,  4, 2,      '#3355cc');
  } else {
    p(ctx, sx+8,  sy+16+bob,    4, 7, '#2244aa');
    p(ctx, sx+12, sy+16+bob,    4, 7, '#2244aa');
    p(ctx, sx+7+legA,  sy+22+bob, 4, 2, '#3355cc');
    p(ctx, sx+13+legA, sy+22+bob, 4, 2, '#3355cc');
  }

  // Shoes
  p(ctx, sx+7,  sy+22+bob, 5, 2, '#221100');
  p(ctx, sx+12, sy+22+bob, 5, 2, '#221100');

  // Body / jacket
  p(ctx, sx+6,  sy+8+bob,  12, 9, '#1a66cc');   // jacket main
  p(ctx, sx+7,  sy+8+bob,  10, 7, '#2277dd');   // jacket front
  p(ctx, sx+9,  sy+9+bob,  6,  5, '#3388ee');   // highlight
  p(ctx, sx+10, sy+8+bob,  4,  1, '#ffdd00');   // collar accent

  // Arms
  if (dir === 'left' || dir === 'right') {
    const armSwing = isMoving ? legA * 2 : 0;
    p(ctx, sx+4,  sy+9+bob+armSwing,  4, 7, '#1a55bb');
    p(ctx, sx+16, sy+9+bob-armSwing, 4, 7, '#1a55bb');
    // Hands
    p(ctx, sx+4,  sy+15+bob+armSwing, 4, 3, '#ffccaa');
    p(ctx, sx+16, sy+15+bob-armSwing, 4, 3, '#ffccaa');
  } else {
    p(ctx, sx+3,  sy+9+bob, 4, 7, '#1a55bb');
    p(ctx, sx+17, sy+9+bob, 4, 7, '#1a55bb');
    p(ctx, sx+3,  sy+15+bob, 4, 3, '#ffccaa');
    p(ctx, sx+17, sy+15+bob, 4, 3, '#ffccaa');
  }

  // Neck
  p(ctx, sx+10, sy+5+bob, 4, 4, '#ffccaa');

  // Head
  p(ctx, sx+6,  sy+1+bob,  12, 8, '#ffddbb');  // head base
  p(ctx, sx+7,  sy+1+bob,  10, 7, '#ffccaa');  // face
  p(ctx, sx+8,  sy+2+bob,  8,  5, '#ffd8aa');  // face highlight

  // Hair
  p(ctx, sx+6,  sy+1+bob,  12, 3, '#4a2800');  // dark hair base
  p(ctx, sx+7,  sy+1+bob,  10, 2, '#6a3c10');  // hair highlight
  p(ctx, sx+6,  sy+1+bob,  3,  4, '#4a2800');  // side hair L
  p(ctx, sx+15, sy+1+bob,  3,  4, '#4a2800');  // side hair R

  // Eyes — direction aware
  if (dir === 'up') {
    // back of head, no eyes
    p(ctx, sx+6, sy+1+bob, 12, 6, '#4a2800');
  } else if (dir === 'left') {
    p(ctx, sx+8, sy+4+bob, 2, 2, '#000000');
    p(ctx, sx+9, sy+4+bob, 1, 1, '#ffffff');
  } else if (dir === 'right') {
    p(ctx, sx+14, sy+4+bob, 2, 2, '#000000');
    p(ctx, sx+14, sy+4+bob, 1, 1, '#ffffff');
  } else { // down / front
    p(ctx, sx+8,  sy+4+bob, 2, 2, '#222222');
    p(ctx, sx+14, sy+4+bob, 2, 2, '#222222');
    p(ctx, sx+9,  sy+4+bob, 1, 1, '#ffffff');
    p(ctx, sx+15, sy+4+bob, 1, 1, '#ffffff');
    // Smile
    p(ctx, sx+9,  sy+7+bob, 1, 1, '#cc7755');
    p(ctx, sx+10, sy+8+bob, 4, 1, '#cc7755');
    p(ctx, sx+13, sy+7+bob, 1, 1, '#cc7755');
  }

  // Hat — iconic trainer style
  p(ctx, sx+5,  sy-2+bob, 14, 5, '#dd2200');  // hat brim
  p(ctx, sx+7,  sy-5+bob, 10, 5, '#ee3300');  // hat crown
  p(ctx, sx+8,  sy-5+bob, 8,  3, '#ff4400');  // hat highlight
  p(ctx, sx+4,  sy-1+bob, 16, 3, '#cc1100');  // brim underside shadow
  p(ctx, sx+9,  sy-2+bob, 6,  2, '#ffffff');  // hat logo band
  p(ctx, sx+10, sy-2+bob, 4,  1, '#ffcc00');  // logo detail
}

function drawMinimap() {
  const s  = 1;
  mmCtx.fillStyle = '#0a0018';
  mmCtx.fillRect(0, 0, 60, 60);

  for (let y = 0; y < MAP_H; y++) {
    for (let x = 0; x < MAP_W; x++) {
      const tile = state.map[y]?.[x];
      let color = '#1a3010';
      if (tile === T.WALL || tile === T.TREE) color = '#2a1a0a';
      if (tile === T.WATER)  color = '#1a2a66';
      if (tile === T.GRASS)  color = '#1a5010';
      if (tile === T.PATH)   color = '#443322';
      if (tile === T.CAVE)   color = '#220022';
      if (tile === T.SHRINE) color = '#664400';
      if (tile === T.RUIN)   color = '#333333';
      if (tile === T.NEST)   color = '#aa8800';
      mmCtx.fillStyle = color;
      mmCtx.fillRect(x * s + 6, y * s + 6, s, s);
    }
  }

  // Player dot
  mmCtx.fillStyle = '#ff4444';
  mmCtx.fillRect(state.px * s + 6 - 1, state.py * s + 6 - 1, 3, 3);

  // View rect
  mmCtx.strokeStyle = 'rgba(255,255,255,0.4)';
  mmCtx.lineWidth   = 1;
  mmCtx.strokeRect(state.camX * s + 6, state.camY * s + 6, VIEW_W * s, VIEW_H * s);
}

// ── MAIN LOOP ─────────────────────────────────────────────
let lastTime = 0;

function gameLoop(timestamp) {
  const dt = timestamp - lastTime;
  lastTime  = timestamp;

  if (!state.inBattle && !state.inDialog) {
    handleMovement(dt);
  }
  updateTimeWeather(dt);
  render();
  requestAnimationFrame(gameLoop);
}

// ── INIT ──────────────────────────────────────────────────
function init() {
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  // Generate starting map
  state.map  = generateMap(state.currentRegion);
  state.camX = state.px - Math.floor(VIEW_W / 2);
  state.camY = state.py - Math.floor(VIEW_H / 2);

  document.getElementById('top-region').textContent = REGIONS[state.currentRegion].name;
  document.getElementById('top-player').textContent = `${state.playerName} — ${REGIONS[state.currentRegion].name.toUpperCase()}`;

  // Give starter creature
  const starter = { ...REGIONS.suncrest_expanse.creatures[0] };
  starter.currentHp = starter.hp;
  starter.maxHp     = starter.hp;
  starter.attack    = starter.atk;
  starter.defense   = starter.def;
  starter.speed     = starter.spd;
  starter.xp        = 0;
  starter.level     = 1;
  starter.energy    = 0;
  starter.status    = null;
  starter.id        = Date.now();
  state.creatures.push(starter);
  state.activeCreatureIdx = 0;

  updateHUD();
  requestAnimationFrame(gameLoop);

  // Welcome
  setTimeout(() => {
    showDialog(
      'WELCOME TO WORLDHATCH',
      'You start in the Suncrest Expanse.\n\n' +
      'WASD or Arrow keys to move.\n' +
      'Walk in tall grass for battles.\n' +
      'Golden tiles are egg nests!\n' +
      'Press ESC for the menu.\n' +
      'Press E to interact.',
      [{ label: 'START!', fn: closeDialog }]
    );
  }, 500);
}

init();
</script>
